<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>WinForge Diagram Studio · 圖表工作室</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#14171c; --panel:#1b2128; --panel2:#232a33; --border:#2d3540;
  --text:#e8ecf3; --dim:#93a0b4;
  --accent:#f28b2f; --accent-soft:rgba(242,139,47,.16);
  --canvas:#161a20; --sel:#4da3ff;
  --btn:#232a33; --btn-h:#2e3742; --btn-b:#39424e;
  --danger:#e5534b;
  --shadow:0 10px 32px rgba(0,0,0,.5);
}
html.light{
  --bg:#eef1f6; --panel:#ffffff; --panel2:#f4f6fa; --border:#d8dee8;
  --text:#1c2732; --dim:#5c6b80;
  --accent:#d9731a; --accent-soft:rgba(217,115,26,.14);
  --canvas:#fafbfd; --sel:#1a73e8;
  --btn:#f0f3f8; --btn-h:#e3e9f1; --btn-b:#c9d2de;
  --shadow:0 10px 32px rgba(25,40,60,.18);
}
html,body{height:100%}
body{font-family:'Segoe UI','Microsoft JhengHei',system-ui,sans-serif;font-size:13px;background:var(--bg);color:var(--text);display:flex;flex-direction:column;overflow:hidden}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font:inherit;color:var(--text)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--btn-b);border-radius:5px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- toolbar ---------- */
#toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:5px;padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--border);user-select:none;z-index:5}
#brand{display:flex;align-items:center;gap:9px;margin-right:8px}
#brand .logo{width:26px;height:26px;flex:none}
#brand .t1{font-weight:600;font-size:13px;line-height:1.15;white-space:nowrap}
#brand .t2{font-size:11px;color:var(--dim);line-height:1.15;white-space:nowrap}
.tb{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;background:var(--btn);border:1px solid var(--btn-b);font-size:12px;white-space:nowrap;transition:background .12s,border-color .12s,color .12s}
.tb:hover{background:var(--btn-h)}
.tb:active{transform:translateY(1px)}
.tb.toggled{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.tb:disabled{opacity:.4;cursor:default;transform:none}
.tb.icon{padding:4px 9px;font-size:14px;line-height:1}
.tsep{width:1px;height:22px;background:var(--border);margin:0 3px;flex:none}
#zoomPct{min-width:48px;text-align:center;color:var(--dim);font-variant-numeric:tabular-nums}

/* ---------- layout ---------- */
#main{flex:1;display:flex;min-height:0}
#palette{width:172px;flex:none;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;user-select:none}
.side-title{padding:10px 12px 6px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
#palGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px 10px 10px}
.pal-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 4px 6px;border:1px solid var(--border);border-radius:8px;background:var(--panel2);cursor:grab}
.pal-item:hover{border-color:var(--accent);background:var(--accent-soft)}
.pal-item.armed{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.pal-item svg{width:58px;height:36px;display:block;pointer-events:none}
.pal-item .pl{font-size:10.5px;color:var(--dim);text-align:center;line-height:1.25;pointer-events:none}
.pal-hint{padding:10px 12px;font-size:11px;color:var(--dim);line-height:1.5;border-top:1px solid var(--border);margin-top:auto}

/* ---------- canvas ---------- */
#cwrap{flex:1;position:relative;min-width:0;background:var(--canvas);overflow:hidden}
#cv{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
#cwrap.panning #cv{cursor:grabbing}
#cwrap.spacepan #cv{cursor:grab}
#cwrap.placing #cv{cursor:crosshair}
.node{cursor:move}
.edgehit{cursor:pointer}
.edgelabel{cursor:pointer}
#labelEditor{position:absolute;display:none;z-index:20;background:var(--panel);border:1.5px solid var(--accent);border-radius:6px;padding:6px 8px;resize:none;outline:none;box-shadow:var(--shadow);line-height:1.3;text-align:center;overflow:hidden}

/* ---------- inspector ---------- */
#inspector{width:238px;flex:none;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;user-select:none;display:flex;flex-direction:column}
#inspNone{padding:12px 14px;color:var(--dim);font-size:12px;line-height:1.5}
#inspBody{padding:4px 12px 14px;display:none;flex-direction:column;gap:9px}
#inspBody.on{display:flex}
.irow{display:flex;align-items:center;gap:8px;font-size:12px}
.irow>span:first-child{flex:1;color:var(--dim)}
.irow input[type=color]{width:36px;height:26px;padding:1px;border:1px solid var(--btn-b);border-radius:5px;background:var(--btn);cursor:pointer}
.irow input[type=number]{width:64px;padding:3px 6px;background:var(--btn);border:1px solid var(--btn-b);border-radius:5px}
.irow input[type=range]{flex:1.4;accent-color:var(--accent)}
.irow select{padding:3px 6px;background:var(--btn);border:1px solid var(--btn-b);border-radius:5px}
.irow.btns{gap:6px}
.irow.btns .tb{flex:1;justify-content:center}
#inOpacityV{width:38px;text-align:right;color:var(--dim);font-variant-numeric:tabular-nums}
.mini{padding:2px 8px;font-size:12px}

/* ---------- status bar ---------- */
#statusbar{display:flex;align-items:center;gap:14px;padding:4px 12px;background:var(--panel);border-top:1px solid var(--border);font-size:11.5px;color:var(--dim);user-select:none;white-space:nowrap}
#stHint{flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis}

/* ---------- modal ---------- */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:50}
.modal-backdrop.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);width:min(660px,92vw);max-height:86vh;display:flex;flex-direction:column}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border)}
.modal-head h2{font-size:15px}
.modal-body{padding:12px 18px 18px;overflow-y:auto}
.hk-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 16px;align-items:center;font-size:12.5px}
kbd{display:inline-block;padding:2px 7px;border:1px solid var(--btn-b);border-bottom-width:2px;border-radius:5px;background:var(--btn);font-family:Consolas,monospace;font-size:11px;white-space:nowrap}
.hk-sec{grid-column:1/-1;margin-top:8px;font-weight:600;color:var(--accent);font-size:12px}

/* ---------- toast ---------- */
#toast{position:fixed;left:50%;bottom:42px;transform:translateX(-50%) translateY(12px);background:var(--panel);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;box-shadow:var(--shadow);font-size:12.5px;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:60;max-width:80vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header id="toolbar">
  <div id="brand">
    <svg class="logo" viewBox="0 0 24 24" aria-hidden="true">
      <rect x="1" y="1" width="22" height="22" rx="5.5" fill="var(--accent)"/>
      <rect x="5" y="5.5" width="7" height="5" rx="1.2" fill="#fff"/>
      <circle cx="16.8" cy="16.8" r="2.7" fill="#fff"/>
      <path d="M8.5 10.5 V 14 H 14" stroke="#fff" stroke-width="1.7" fill="none" stroke-linecap="round"/>
    </svg>
    <div><div class="t1">WinForge Diagram Studio</div><div class="t2">圖表工作室 · DiagramForge</div></div>
  </div>
  <div class="tsep"></div>
  <button class="tb" id="btnNew" data-en="New" data-zh="新增" data-tipen="New diagram (clears the canvas)" data-tipzh="開一張新圖表（清空畫布）"></button>
  <button class="tb" id="btnOpen" data-en="Open" data-zh="開啟" data-tipen="Open a diagram JSON file" data-tipzh="開啟圖表 JSON 檔案"></button>

  <button class="tb" id="btnSvg" data-en="Export SVG" data-zh="匯出 SVG" data-tipen="Export the diagram as an SVG image" data-tipzh="將圖表匯出做 SVG 圖像"></button>
  <button class="tb" id="btnPng" data-en="Export PNG" data-zh="匯出 PNG" data-tipen="Export the diagram as a PNG image" data-tipzh="將圖表匯出做 PNG 圖像"></button>
  <div class="tsep"></div>
  <button class="tb icon" id="btnUndo" data-tipen="Undo (Ctrl+Z)" data-tipzh="復原（Ctrl+Z）">⟲</button>

  <button class="tb" id="btnDup" data-en="Duplicate" data-zh="複製一份" data-tipen="Duplicate selection (Ctrl+D)" data-tipzh="將揀咗嘅嘢複製一份（Ctrl+D）"></button>
  <button class="tb" id="btnDelete" data-en="Delete" data-zh="刪除" data-tipen="Delete selection (Delete)" data-tipzh="刪除揀咗嘅嘢（Delete）"></button>
  <div class="tsep"></div>
  <button class="tb icon" id="btnZoomOut" data-tipen="Zoom out (Ctrl+-)" data-tipzh="縮細（Ctrl+-）">−</button>
  <span id="zoomPct">100%</span>
  <button class="tb icon" id="btnZoomIn" data-tipen="Zoom in (Ctrl+=)" data-tipzh="放大（Ctrl+=）">+</button>
  <button class="tb" id="btnFit" data-en="Fit" data-zh="適合" data-tipen="Fit the diagram to the window (Ctrl+Shift+H)" data-tipzh="令圖表啱晒個視窗（Ctrl+Shift+H）"></button>
  <button class="tb icon" id="btn100" data-tipen="Reset zoom to 100% (Ctrl+0)" data-tipzh="縮放還原 100%（Ctrl+0）">1:1</button>
  <div class="tsep"></div>
  <button class="tb" id="btnSnap" data-en="Snap" data-zh="貼齊" data-tipen="Snap to grid on/off" data-tipzh="開關貼齊格線"></button>
  <button class="tb" id="btnGrid" data-en="Grid" data-zh="格線" data-tipen="Show/hide the grid" data-tipzh="顯示或隱藏格線"></button>
  <button class="tb" id="btnEdgeStyle" data-tipen="Style for NEW connectors (orthogonal / straight)" data-tipzh="新連線嘅樣式（正交／直線）"></button>
  <div class="tsep"></div>
  <button class="tb" id="btnHelp" data-en="Help" data-zh="說明" data-tipen="Keyboard shortcuts (F1)" data-tipzh="鍵盤快捷鍵（F1）"></button>
  <button class="tb" id="btnLang" data-tipen="Cycle language — the WinForge host setting overrides this" data-tipzh="切換語言 — 以 WinForge 主程式設定為準">雙語</button>
</header>

<main id="main">
  <aside id="palette">
    <div class="side-title" data-en="Shapes" data-zh="圖形"></div>
    <div id="palGrid"></div>
    <div class="pal-hint" data-en="Drag a shape onto the canvas, or click it then click the canvas. Hover a placed shape to see its connector ports." data-zh="將圖形拖落畫布，或者點一下再點畫布。將滑鼠停喺圖形上面就見到連接點。"></div>

  <div id="cwrap">

    <div id="inspBody">
      <div class="irow" id="rowFill">

        <button class="tb mini" id="btnNoFill" data-tipen="No fill (transparent)" data-tipzh="無填色（透明）">∅</button>

      </div>
    </div>
  </aside>
</main>

<footer id="statusbar">
  <span id="stZoom"></span>
  <span id="stNodes"></span>
  <span id="stEdges"></span>
  <span id="stSel"></span>
  <span id="stHint"></span>
</footer>

    <div class="modal-head">
      <h2 data-en="Keyboard shortcuts &amp; gestures" data-zh="鍵盤快捷鍵同手勢"></h2>

        <span><kbd>Ctrl</kbd>+<kbd>D</kbd></span><span data-en="Duplicate the selection" data-zh="將揀咗嘅嘢複製一份"></span>
        <span><kbd>Ctrl</kbd>+<kbd>A</kbd></span><span data-en="Select everything" data-zh="全部揀晒"></span>
        <span><kbd>Delete</kbd></span><span data-en="Delete the selection" data-zh="刪除揀咗嘅嘢"></span>
        <span><kbd>←</kbd><kbd>↑</kbd><kbd>↓</kbd><kbd>→</kbd></span><span data-en="Nudge by one grid step (Shift = 1 px)" data-zh="按格移動（Shift = 逐 1 像素）"></span>
        <div class="hk-sec" data-en="View" data-zh="檢視"></div>

        <div class="hk-sec" data-en="Canvas" data-zh="畫布"></div>
        <span><kbd>Double-click</kbd></span><span data-en="On a shape or connector: edit its label. On empty canvas: add a text label." data-zh="喺圖形或連線上面：編輯文字。喺空白畫布：加一個文字標籤。"></span>

</div>

<input type="file" id="fileInput" accept=".json,application/json" hidden>

<script>
'use strict';
/* ================================================================
   WinForge Diagram Studio · 圖表工作室 (DiagramForge)
   Pure vanilla JS + SVG. Fully offline. No external libraries.
   ================================================================ */

/* ---------------- tiny helpers ---------------- */
const $ = id => document.getElementById(id);
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const num = (v, d) => { const n = +v; return Number.isFinite(n) ? n : d; };
const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
const COLOR_RE = /^(#[0-9a-fA-F]{3}|#[0-9a-fA-F]{6}|#[0-9a-fA-F]{8}|none)$/;
const col = (v, d) => COLOR_RE.test(String(v || '')) ? String(v) : d;

/* ---------------- i18n ---------------- */
let lang = 'Bilingual'; // 'En' | 'Zh' | 'Bilingual'
function L(en, zh) { return lang === 'En' ? en : lang === 'Zh' ? zh : en + ' · ' + zh; }
function applyLanguage() {
  document.querySelectorAll('[data-en]').forEach(el => { el.textContent = L(el.dataset.en, el.dataset.zh || el.dataset.en); });
  document.querySelectorAll('[data-tipen]').forEach(el => { el.title = L(el.dataset.tipen, el.dataset.tipzh || el.dataset.tipen); });
  syncToggleButtons();
  updateStatus();
  refreshInspector();
}
function syncToggleButtons() {
  $('btnSnap').classList.toggle('toggled', snap);
  $('btnGrid').classList.toggle('toggled', showGrid);
  $('btnEdgeStyle').textContent = edgeStyleDefault === 'ortho' ? L('Edges: Orthogonal', '連線：正交') : L('Edges: Straight', '連線：直線');
  $('btnLang').textContent = lang === 'Bilingual' ? '雙語' : (lang === 'En' ? 'EN' : '中文');
}

/* ---------------- WebView2 bridge ---------------- */
const bridge = (window.chrome && window.chrome.webview) ? window.chrome.webview : null;
if (bridge) {
  bridge.addEventListener('message', ev => {
    const d = ev.data || {};
    try {
      if (d.type === 'language') {
        if (['En', 'Zh', 'Bilingual'].includes(d.lang)) lang = d.lang;
        applyLanguage();
      } else if (d.type === 'theme') {
        document.documentElement.classList.toggle('light', !d.dark);
        render(); // node label contrast + edge label halos depend on theme
      }
    } catch (err) { /* never crash on host messages */ }
  });
}
function hostSave(name, mime, dataBase64) {
  try {
    if (bridge) {
      bridge.postMessage({ type: 'save', name: name, mime: mime, dataBase64: dataBase64 });
    } else {
      const a = document.createElement('a');
      a.href = 'data:' + mime + ';base64,' + dataBase64;
      a.download = name;
      document.body.appendChild(a); a.click(); a.remove();
    }
    toast(L('Saving', '儲存緊') + ': ' + name);
  } catch (err) { toast(L('Save failed', '儲存失敗') + ': ' + err.message); }
}
const b64 = s => btoa(unescape(encodeURIComponent(s)));

/* ---------------- document state ---------------- */
const GRID = 20, MINW = 30, MINH = 24;
let doc = { nodes: [], edges: [] };
let nextId = 1;
const uid = p => p + (nextId++);
let sel = new Set();                       // selected node/edge ids
let view = { x: 60, y: 40, z: 1 };         // pan offset (screen px) + zoom
let snap = true, showGrid = true;
let edgeStyleDefault = 'ortho';
let clipboard = null;
let undoStack = [], redoStack = [];
let hoverId = null;                        // node under the cursor (for ports)
let drag = null;                           // active pointer interaction
let placeType = null;                      // armed palette shape
let spaceHeld = false;
let editing = null;                        // in-place label editor state

/* ---------------- shape catalog ---------------- */
const SHAPES = {
  rect:    { en: 'Process',        zh: '流程',      w: 150, h: 70,  fill: '#4e79d4', stroke: '#2f4d95' },
  rrect:   { en: 'Start / End',    zh: '開始／結束', w: 150, h: 64,  fill: '#4aa06b', stroke: '#2e6b45' },

<script>
'use strict';
/* ================= interaction ================= */
function nodeAt(pt, margin) {
  const m = margin || 0;
  for (let i = doc.nodes.length - 1; i >= 0; i--) {
    const n = doc.nodes[i];
    if (pt.x >= n.x - m && pt.x <= n.x + n.w + m && pt.y >= n.y - m && pt.y <= n.y + n.h + m) return n;
  }
  return null;
}
function rectsIntersect(r, n) {
  return !(n.x > r.x + r.w || n.x + n.w < r.x || n.y > r.y + r.h || n.y + n.h < r.y);
}
function setsEqual(a, b) {
  if (a.size !== b.size) return false;
  for (const v of a) if (!b.has(v)) return false;
  return true;
}
function placeNode(type, pt) {
  const sdef = SHAPES[type] || SHAPES.rect;
  mutate(() => {
    const n = makeNode(type, snapv(pt.x - sdef.w / 2), snapv(pt.y - sdef.h / 2));
    doc.nodes.push(n);
    sel = new Set([n.id]);
  });
}

function onPointerDown(ev) {
  if (editing) closeLabelEditor(true);
  try { svg.setPointerCapture(ev.pointerId); } catch (err) {}
  const pt = toWorld(ev);
  if (ev.button === 1 || (ev.button === 0 && spaceHeld)) {
    drag = { mode: 'pan', sx: ev.clientX, sy: ev.clientY, vx: view.x, vy: view.y };
    cwrap.classList.add('panning');
    ev.preventDefault();
    return;
  }
  if (ev.button !== 0) return;
  const closest = sel2 => (ev.target.closest ? ev.target.closest(sel2) : null);
  const hEl = closest('.handle');
  if (hEl) {
    const n = selectedNodes()[0];
    if (!n) return;
    beginChange();
    drag = { mode: 'resize', dir: hEl.dataset.dir, id: n.id, orig: { x: n.x, y: n.y, w: n.w, h: n.h }, sx: pt.x, sy: pt.y };
    return;
  }
  const pEl = closest('.port');
  if (pEl) {
    drag = { mode: 'edge', from: { node: pEl.dataset.node, port: pEl.dataset.port }, pt: pt, target: null };
    renderOverlay();
    return;
  }
  if (placeType) {
    placeNode(placeType, pt);
    if (!ev.shiftKey) armPlace(null);
    return;
  }
  const eEl = closest('.edgehit') || closest('.edgeline') || closest('.edgelabel');
  if (eEl) {
    const id = eEl.dataset.id;
    if (ev.shiftKey) { if (sel.has(id)) sel.delete(id); else sel.add(id); }
    else if (!sel.has(id)) sel = new Set([id]);
    drag = { mode: 'clickedge', id: id };
    render(); refreshInspector();
    return;
  }
  const nEl = closest('.node');
  if (nEl) {
    const id = nEl.dataset.id;
    let shiftDesel = false;
    if (ev.shiftKey) { if (sel.has(id)) shiftDesel = true; else sel.add(id); }
    else if (!sel.has(id)) sel = new Set([id]);
    beginChange();
    const orig = new Map();
    selectedNodes().forEach(n => orig.set(n.id, { x: n.x, y: n.y }));

    render(); refreshInspector();
    return;

function onPointerMove(ev) {
  const pt = toWorld(ev);

    const n = nodeAt(pt, 14 / view.z);
    const id = n ? n.id : null;
    if (id !== hoverId) { hoverId = id; renderOverlay(); }

  }
  switch (drag.mode) {
    case 'pan': {
      view.x = drag.vx + (ev.clientX - drag.sx);
      view.y = drag.vy + (ev.clientY - drag.sy);
      applyViewTransform();
      return;
    }
    case 'move': {
      const dx = pt.x - drag.sx, dy = pt.y - drag.sy;
      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) drag.moved = true;
      if (!drag.moved) return;
      for (const [id, o] of drag.orig) {
        const n = nodeById(id);
        if (n) { n.x = snapv(o.x + dx); n.y = snapv(o.y + dy); }

      render();
      return;
    }
    case 'resize': {
      const n = nodeById(drag.id);
      if (!n) return;
      const dx = pt.x - drag.sx, dy = pt.y - drag.sy, o = drag.orig, d = drag.dir;
      let x = o.x, y = o.y, w = o.w, h = o.h;
      if (d.indexOf('e') >= 0) w = o.w + dx;
      if (d.indexOf('s') >= 0) h = o.h + dy;
      if (d.indexOf('w') >= 0) { x = o.x + dx; w = o.w - dx; }
      if (d.indexOf('n') >= 0) { y = o.y + dy; h = o.h - dy; }
      if (snap) {
        if (d.indexOf('w') >= 0) { x = snapv(x); w = o.x + o.w - x; }
        if (d.indexOf('n') >= 0) { y = snapv(y); h = o.y + o.h - y; }
        if (d.indexOf('e') >= 0) { w = snapv(x + w) - x; }
        if (d.indexOf('s') >= 0) { h = snapv(y + h) - y; }
      }
      if (w < MINW) { if (d.indexOf('w') >= 0) x = o.x + o.w - MINW; w = MINW; }
      if (h < MINH) { if (d.indexOf('n') >= 0) y = o.y + o.h - MINH; h = MINH; }
      n.x = x; n.y = y; n.w = w; n.h = h;
      render();
      return;

    case 'edge': {
      drag.pt = pt;
      const t = nodeAt(pt, 14 / view.z);
      if (t && t.id !== drag.from.node) {
        drag.target = { node: t.id, port: nearestPort(t, pt) };
        hoverId = t.id;

        hoverId = drag.from.node;

      return;

      for (const e of doc.edges) {
        const pts = edgePoints(e);
        if (pts && pts.every(p => p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h)) ns.add(e.id);

      if (!setsEqual(ns, sel)) { sel = ns; render(); refreshInspector(); }
      renderOverlay();
      return;

}

function onPointerUp(ev) {
  if (!drag) return;
  const d = drag;
  drag = null;
  cwrap.classList.remove('panning');
  try { svg.releasePointerCapture(ev.pointerId); } catch (err) {}
  if (d.mode === 'pan') { renderOverlay(); updateStatus(); return; }
  if (d.mode === 'move') {
    if (!d.moved) {
      if (d.shiftDesel) sel.delete(d.clickId);
      else if (!d.shift) sel = new Set([d.clickId]);
      preChange = null;
      render(); refreshInspector(); updateStatus();
    } else {
      commitChange(); render();
    }
    return;
  }
  if (d.mode === 'resize') { commitChange(); render(); refreshInspector(); return; }
  if (d.mode === 'edge') {
    if (d.target) {
      mutate(() => {
        const e = {
          id: uid('e'), from: d.from, to: d.target, label: '',
          style: edgeStyleDefault, stroke: isLight() ? '#5c6b80' : '#8b98ab',
          strokeW: 2, fontSize: 12, opacity: 1
        };
        doc.edges.push(e);
        sel = new Set([e.id]);
      });
    } else renderOverlay();
    return;
  }
  if (d.mode === 'rubber') { renderOverlay(); updateStatus(); return; }
}

function onDblClick(ev) {
  const closest = sel2 => (ev.target.closest ? ev.target.closest(sel2) : null);
  const nEl = closest('.node');
  if (nEl) { openLabelEditor('node', nEl.dataset.id); return; }
  const eEl = closest('.edgehit') || closest('.edgeline') || closest('.edgelabel');
  if (eEl) { openLabelEditor('edge', eEl.dataset.id); return; }
  const pt = toWorld(ev);
  let newId = null;
  mutate(() => {
    const n = makeNode('text', snapv(pt.x - 70), snapv(pt.y - 18));
    n.label = '';

    newId = n.id;

function onWheel(ev) {
  ev.preventDefault();
  if (ev.ctrlKey) {
    const r = svg.getBoundingClientRect();
    const mx = ev.clientX - r.left, my = ev.clientY - r.top;
    const wx = (mx - view.x) / view.z, wy = (my - view.y) / view.z;
    const f = ev.deltaY < 0 ? 1.12 : 1 / 1.12;
    view.z = clamp(view.z * f, 0.2, 4);
    view.x = mx - wx * view.z;
    view.y = my - wy * view.z;
    applyViewTransform(); renderOverlay(); updateStatus();
  } else {
    if (ev.shiftKey) { view.x -= ev.deltaY; }
    else { view.x -= ev.deltaX; view.y -= ev.deltaY; }
    applyViewTransform();
  }
}

svg.addEventListener('pointerdown', onPointerDown);
svg.addEventListener('pointermove', onPointerMove);
svg.addEventListener('pointerup', onPointerUp);
svg.addEventListener('pointercancel', onPointerUp);
svg.addEventListener('dblclick', onDblClick);
svg.addEventListener('wheel', onWheel, { passive: false });
cwrap.addEventListener('contextmenu', ev => ev.preventDefault());

    ev.dataTransfer.dropEffect = 'copy';

});
cwrap.addEventListener('drop', ev => {
  if (!ev.dataTransfer) return;
  const t = ev.dataTransfer.getData('text/winforge-shape');
  if (!t) return;
  ev.preventDefault();
  placeNode(t, toWorld(ev));
});

/* ---------------- in-place label editor ---------------- */
const editor = $('labelEditor');
function openLabelEditor(kind, id) {

  if (!obj) return;
  editing = { kind: kind, id: id, orig: obj.label || '' };
  let sx, sy, sw, sh;
  if (kind === 'node') {
    sx = view.x + obj.x * view.z;
    sy = view.y + obj.y * view.z;
    sw = Math.max(96, obj.w * view.z);
    sh = Math.max(36, obj.h * view.z);
  } else {
    const pts = edgePoints(obj) || [{ x: 0, y: 0 }];
    const m = midOf(pts);
    sw = 170; sh = 36;
    sx = view.x + m.x * view.z - sw / 2;
    sy = view.y + m.y * view.z - sh / 2;

  editor.style.left = sx + 'px';
  editor.style.top = sy + 'px';
  editor.style.width = sw + 'px';
  editor.style.height = sh + 'px';

  if (commit && val !== ed.orig) {

    if (ed.kind === 'node' && obj.type === 'text' && !val.trim()) {

  else if (ev.key === 'Escape') { closeLabelEditor(false); }

/* ---------------- keyboard ---------------- */
window.addEventListener('keydown', ev => {
  const t = ev.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT')) return;
  if (ev.key === ' ') {
    if (!spaceHeld) { spaceHeld = true; cwrap.classList.add('spacepan'); }
    ev.preventDefault();

  }

    if (k === 'v') { ev.preventDefault(); doPaste(); return; }
    if (k === 'd') { ev.preventDefault(); doDuplicate(); return; }

    if (ev.key === '=' || ev.key === '+') { ev.preventDefault(); zoomAt(1.2); return; }

  if (ev.key === 'Escape') {

    if (placeType) { armPlace(null); return; }
    if (sel.size) { sel = new Set(); render(); refreshInspector(); updateStatus(); }
    return;
  }
  if (ev.key === 'F1' || ev.key === '?') { ev.preventDefault(); openHelp(); return; }
  if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(ev.key)) {

    if (!nodes.length) return;
    ev.preventDefault();
    const step = ev.shiftKey ? 1 : GRID;
    const dx = ev.key === 'ArrowLeft' ? -step : ev.key === 'ArrowRight' ? step : 0;
    const dy = ev.key === 'ArrowUp' ? -step : ev.key === 'ArrowDown' ? step : 0;
    mutate(() => { nodes.forEach(n => { n.x += dx; n.y += dy; }); });
  }
});
window.addEventListener('keyup', ev => {
  if (ev.key === ' ') { spaceHeld = false; cwrap.classList.remove('spacepan'); }
});
window.addEventListener('resize', () => { applyViewTransform(); });

<script>
'use strict';
/* ================= view helpers ================= */
function zoomCore(newZ) {
  const r = svg.getBoundingClientRect();
  const mx = r.width / 2, my = r.height / 2;
  const wx = (mx - view.x) / view.z, wy = (my - view.y) / view.z;
  view.z = clamp(newZ, 0.2, 4);
  view.x = mx - wx * view.z;
  view.y = my - wy * view.z;
  applyViewTransform(); renderOverlay(); updateStatus();
}
function zoomAt(f) { zoomCore(view.z * f); }
function zoomTo(z) { zoomCore(z); }
function contentBBox(pad) {
  if (!doc.nodes.length && !doc.edges.length) return null;
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  for (const n of doc.nodes) {
    x0 = Math.min(x0, n.x); y0 = Math.min(y0, n.y);
    x1 = Math.max(x1, n.x + n.w); y1 = Math.max(y1, n.y + n.h);
  }
  for (const e of doc.edges) {
    const pts = edgePoints(e);
    if (pts) for (const p of pts) {
      x0 = Math.min(x0, p.x); y0 = Math.min(y0, p.y);
      x1 = Math.max(x1, p.x); y1 = Math.max(y1, p.y);
    }
  }
  if (x0 === Infinity) return null;
  const pd = pad || 0;
  return { x: x0 - pd, y: y0 - pd, w: (x1 - x0) + pd * 2, h: (y1 - y0) + pd * 2 };
}
function fitView() {
  const bb = contentBBox(60);
  const r = svg.getBoundingClientRect();
  if (!bb || !r.width || !r.height) { view = { x: 60, y: 40, z: 1 }; }
  else {
    const z = clamp(Math.min(r.width / bb.w, r.height / bb.h), 0.2, 2);
    view.z = z;
    view.x = (r.width - bb.w * z) / 2 - bb.x * z;
    view.y = (r.height - bb.h * z) / 2 - bb.y * z;
  }
  applyViewTransform(); renderOverlay(); updateStatus();
}

/* ================= inspector ================= */
let inspectorPre = null;
function toHex6(c) {
  if (!c || c === 'none') return '#888888';
  if (/^#[0-9a-fA-F]{6}$/.test(c)) return c;
  if (/^#[0-9a-fA-F]{3}$/.test(c)) return '#' + c.slice(1).split('').map(x => x + x).join('');
  return '#888888';
}
function refreshInspector() {
  const nodes = selectedNodes(), edges = selectedEdges();
  const any = nodes.length + edges.length > 0;
  $('inspNone').style.display = any ? 'none' : 'block';
  $('inspBody').classList.toggle('on', any);
  if (!any) return;
  const first = nodes[0] || edges[0];
  $('inFill').value = toHex6(nodes[0] ? nodes[0].fill : '#4e79d4');
  $('inStroke').value = toHex6(first.stroke);
  $('inStrokeW').value = first.strokeW;
  $('inFontSize').value = first.fontSize;
  $('inOpacity').value = Math.round(first.opacity * 100);
  $('inOpacityV').textContent = Math.round(first.opacity * 100) + '%';
  $('rowFill').style.display = nodes.length ? 'flex' : 'none';
  $('rowZ').style.display = nodes.length ? 'flex' : 'none';
  $('rowEdgeStyle').style.display = edges.length ? 'flex' : 'none';
  if (edges.length) $('inEdgeStyle').value = edges[0].style;
}
function applyStyle(fn) {
  if (!sel.size) return;
  if (inspectorPre === null) inspectorPre = snapshot();
  for (const n of selectedNodes()) fn(n, true);
  for (const e of selectedEdges()) fn(e, false);
  render();
}
function commitStyle() {
  if (inspectorPre !== null && snapshot() !== inspectorPre) {
    undoStack.push(inspectorPre);
    if (undoStack.length > 150) undoStack.shift();
    redoStack.length = 0;
  }
  inspectorPre = null;
  updateStatus();
}
$('inFill').addEventListener('input', () => applyStyle((o, isN) => { if (isN) o.fill = $('inFill').value; }));
$('inFill').addEventListener('change', commitStyle);
$('btnNoFill').addEventListener('click', () => { applyStyle((o, isN) => { if (isN) o.fill = 'none'; }); commitStyle(); });
$('inStroke').addEventListener('input', () => applyStyle(o => { o.stroke = $('inStroke').value; }));
$('inStroke').addEventListener('change', commitStyle);
$('inStrokeW').addEventListener('input', () => applyStyle(o => { o.strokeW = clamp(num($('inStrokeW').value, 2), 0, 12); }));
$('inStrokeW').addEventListener('change', commitStyle);
$('inFontSize').addEventListener('input', () => applyStyle(o => { o.fontSize = clamp(num($('inFontSize').value, 14), 8, 64); }));
$('inFontSize').addEventListener('change', commitStyle);
$('inOpacity').addEventListener('input', () => {
  $('inOpacityV').textContent = $('inOpacity').value + '%';
  applyStyle(o => { o.opacity = clamp(num($('inOpacity').value, 100), 10, 100) / 100; });
});
$('inOpacity').addEventListener('change', commitStyle);
$('inEdgeStyle').addEventListener('change', () => {
  applyStyle((o, isN) => { if (!isN) o.style = $('inEdgeStyle').value === 'straight' ? 'straight' : 'ortho'; });
  commitStyle();
});
$('btnFront').addEventListener('click', () => mutate(() => {
  const ss = selectedNodes();
  doc.nodes = doc.nodes.filter(n => !sel.has(n.id)).concat(ss);
}));
$('btnBack').addEventListener('click', () => mutate(() => {
  const ss = selectedNodes();
  doc.nodes = ss.concat(doc.nodes.filter(n => !sel.has(n.id)));
}));

/* ================= clipboard / edit ops ================= */
function doCopy() {
  const nodes = selectedNodes().map(n => JSON.parse(JSON.stringify(n)));
  const ids = new Set(nodes.map(n => n.id));
  const edges = doc.edges.filter(e => ids.has(e.from.node) && ids.has(e.to.node)).map(e => JSON.parse(JSON.stringify(e)));
  if (!nodes.length) { toast(L('Nothing to copy', '冇嘢可以複製')); return false; }
  clipboard = { nodes: nodes, edges: edges };
  toast(L('Copied', '複製咗') + ' ' + nodes.length + ' ' + L('shape(s)', '個圖形'));
  return true;
}
function doPaste() {
  if (!clipboard || !clipboard.nodes.length) { toast(L('Clipboard is empty', '剪貼簿係空嘅')); return; }
  mutate(() => {
    const map = new Map();
    const newSel = new Set();
    for (const n of clipboard.nodes) {
      const c = JSON.parse(JSON.stringify(n));
      const nid = uid('n');
      map.set(n.id, nid);
      c.id = nid; c.x += 24; c.y += 24;
      doc.nodes.push(c); newSel.add(nid);
    }
    for (const e of clipboard.edges) {
      const c = JSON.parse(JSON.stringify(e));
      c.id = uid('e');
      c.from = { node: map.get(e.from.node), port: e.from.port };
      c.to = { node: map.get(e.to.node), port: e.to.port };
      doc.edges.push(c); newSel.add(c.id);
    }
    sel = newSel;
  });
  clipboard.nodes.forEach(n => { n.x += 24; n.y += 24; }); // cascade repeat pastes
}
function doDuplicate() { if (doCopy()) doPaste(); }
function doCut() { if (doCopy()) doDelete(); }
function doDelete() {
  if (!sel.size) return;
  mutate(() => {
    doc.nodes = doc.nodes.filter(n => !sel.has(n.id));
    const ids = new Set(doc.nodes.map(n => n.id));
    doc.edges = doc.edges.filter(e => !sel.has(e.id) && ids.has(e.from.node) && ids.has(e.to.node));
    sel = new Set();
  });
}
function doSelectAll() {
  sel = new Set(doc.nodes.map(n => n.id).concat(doc.edges.map(e => e.id)));
  render(); refreshInspector(); updateStatus();
}

/* ================= persistence ================= */
function docJson() {
  return JSON.stringify({ app: 'WinForge DiagramForge', version: 1, nodes: doc.nodes, edges: doc.edges }, null, 2);
}
function exportJson() { hostSave('diagram.json', 'application/json', b64(docJson())); }
function sanitizeDoc(o) {
  if (!o || typeof o !== 'object') throw new Error('bad');
  const rn = Array.isArray(o.nodes) ? o.nodes : null;
  const re = Array.isArray(o.edges) ? o.edges : [];
  if (!rn) throw new Error('bad');
  const nodes = [], ids = new Set();
  for (const r of rn) {
    if (!r || typeof r !== 'object') continue;
    const type = SHAPES[r.type] ? String(r.type) : 'rect';
    let id = (typeof r.id === 'string' && r.id) ? r.id : ('n_' + Math.random().toString(36).slice(2, 8));
    while (ids.has(id)) id += 'x';
    ids.add(id);
    nodes.push({
      id: id, type: type, x: num(r.x, 0), y: num(r.y, 0),
      w: clamp(num(r.w, 140), MINW, 4000), h: clamp(num(r.h, 70), MINH, 4000),
      label: typeof r.label === 'string' ? r.label.slice(0, 2000) : '',
      fill: col(r.fill, SHAPES[type].fill), stroke: col(r.stroke, SHAPES[type].stroke || '#666666'),
      strokeW: clamp(num(r.strokeW, 2), 0, 12), fontSize: clamp(num(r.fontSize, 14), 8, 64),
      opacity: clamp(num(r.opacity, 1), 0.05, 1)
    });
  }
  const edges = [], eids = new Set();
  for (const r of re) {
    if (!r || typeof r !== 'object' || !r.from || !r.to) continue;
    const fn = String(r.from.node || ''), tn = String(r.to.node || '');
    if (!ids.has(fn) || !ids.has(tn)) continue;
    let id = (typeof r.id === 'string' && r.id) ? r.id : ('e_' + Math.random().toString(36).slice(2, 8));
    while (eids.has(id) || ids.has(id)) id += 'x';
    eids.add(id);
    edges.push({
      id: id,
      from: { node: fn, port: PORTS.includes(r.from.port) ? r.from.port : 'e' },
      to: { node: tn, port: PORTS.includes(r.to.port) ? r.to.port : 'w' },
      label: typeof r.label === 'string' ? r.label.slice(0, 500) : '',
      style: r.style === 'straight' ? 'straight' : 'ortho',
      stroke: col(r.stroke, '#8b98ab'), strokeW: clamp(num(r.strokeW, 2), 1, 12),
      fontSize: clamp(num(r.fontSize, 12), 8, 48), opacity: clamp(num(r.opacity, 1), 0.05, 1)
    });
  }
  return { nodes: nodes, edges: edges };
}
function recomputeNextId() {
  let m = 0;
  const scan = id => { const mt = /^[ne](\d+)$/.exec(id); if (mt) m = Math.max(m, +mt[1]); };
  doc.nodes.forEach(n => scan(n.id));
  doc.edges.forEach(e => scan(e.id));
  nextId = m + 1;
}
function importJsonText(txt) {
  let o;
  try { o = JSON.parse(txt); }
  catch (err) { toast(L('Invalid JSON file', 'JSON 檔案格式唔啱')); return; }
  let d;
  try { d = sanitizeDoc(o); }
  catch (err) { toast(L('Not a DiagramForge diagram file', '唔係 DiagramForge 圖表檔案')); return; }
  beginChange();
  doc = d; sel = new Set(); hoverId = null;
  recomputeNextId();
  commitChange();
  render(); refreshInspector(); fitView();
  toast(L('Diagram loaded', '圖表載入咗') + ' — ' + doc.nodes.length + ' / ' + doc.edges.length);
}
$('fileInput').addEventListener('change', ev => {
  const f = ev.target.files && ev.target.files[0];
  ev.target.value = '';
  if (!f) return;
  const rd = new FileReader();
  rd.onload = () => importJsonText(String(rd.result));
  rd.onerror = () => toast(L('Could not read the file', '讀唔到個檔案'));
  rd.readAsText(f);
});

/* ----- SVG / PNG export ----- */
function buildStandaloneSvg() {
  const bb = contentBBox(40) || { x: 0, y: 0, w: 800, h: 500 };
  let s = '<svg xmlns="http://www.w3.org/2000/svg" width="' + Math.ceil(bb.w) + '" height="' + Math.ceil(bb.h) +
          '" viewBox="' + bb.x + ' ' + bb.y + ' ' + bb.w + ' ' + bb.h + '">';
  s += '<rect x="' + bb.x + '" y="' + bb.y + '" width="' + bb.w + '" height="' + bb.h + '" fill="' + canvasBg() + '"/>';
  s += '<defs>' + markerDefs() + '</defs>';
  s += doc.edges.map(e => edgeSvg(e, true)).join('');
  s += doc.nodes.map(n => nodeSvg(n, true)).join('');
  return s + '</svg>';
}
function exportSvg() { hostSave('diagram.svg', 'image/svg+xml', b64(buildStandaloneSvg())); }
function exportPng() {
  const bb = contentBBox(40) || { x: 0, y: 0, w: 800, h: 500 };
  const svgStr = buildStandaloneSvg();
  const img = new Image();
  const scale = 2;
  img.onload = () => {
    try {
      const c = document.createElement('canvas');
      c.width = Math.max(1, Math.round(bb.w * scale));
      c.height = Math.max(1, Math.round(bb.h * scale));
      const ctx = c.getContext('2d');
      ctx.fillStyle = canvasBg();
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.drawImage(img, 0, 0, c.width, c.height);
      hostSave('diagram.png', 'image/png', c.toDataURL('image/png').split(',')[1]);
    } catch (err) { toast(L('PNG export failed', 'PNG 匯出失敗') + ': ' + err.message); }
  };
  img.onerror = () => toast(L('PNG export failed', 'PNG 匯出失敗'));
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
}
function newDoc() {
  if (doc.nodes.length || doc.edges.length) {
    beginChange();
    doc = { nodes: [], edges: [] };
    sel = new Set(); hoverId = null;
    commitChange();
  }
  view = { x: 60, y: 40, z: 1 };
  render(); refreshInspector();
  toast(L('New diagram — undo restores the old one', '新圖表 — 復原可以攞返舊嗰張'));
}

$('btnLang').addEventListener('click', () => {
  lang = lang === 'Bilingual' ? 'En' : lang === 'En' ? 'Zh' : 'Bilingual';

let toastTimer = null;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ================= sample diagram ================= */
function seedSample() {
  const mk = (t, x, y, label, extra) => {
    const n = makeNode(t, x, y);
    n.label = label;
    if (extra) Object.assign(n, extra);
    doc.nodes.push(n);
    return n;
  };
  const a = mk('rrect', 140, 40, 'Start · 開始');
  const b = mk('rect', 135, 190, 'Collect input · 收集輸入', { w: 160 });
  const c = mk('diamond', 140, 340, 'Valid? · 啱唔啱？');
  const d = mk('cyl', 470, 350, 'Database · 資料庫');
  mk('note', 440, 60,
     'Welcome to DiagramForge!\n歡迎使用圖表工作室！\n\nDrag shapes from the left.\n由左邊拖圖形出嚟。',
     { w: 230, h: 132, fontSize: 12 });
  const con = (f, fp, t2, tp, label) => {
    doc.edges.push({
      id: uid('e'), from: { node: f.id, port: fp }, to: { node: t2.id, port: tp },
      label: label || '', style: 'ortho', stroke: '#8b98ab', strokeW: 2, fontSize: 12, opacity: 1
    });
  };
  con(a, 's', b, 'n');
  con(b, 's', c, 'n');
  con(c, 'e', d, 'w', 'Yes · 係');
  con(c, 'w', b, 'w', 'No · 唔係');
}

  buildPalette();

      bridge.postMessage({ type: 'ready' });
      bridge.postMessage({ type: 'setTitle', text: 'WinForge Diagram Studio · 圖表工作室' });
    } catch (err) {}
  }
}
