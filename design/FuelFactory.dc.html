<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d0c; --panel:#111614; --panel2:#161d1a; --panel3:#1e2723;
    --line:#243029; --line2:#33433a;
    --text:#e7f2ec; --muted:#92a89c; --dim:#5d7066;
    --green:#46d17a; --lime:#9be86a; --amber:#ffce46; --cyan:#46d6c0; --red:#ff5d52; --violet:#9b8cff; --gold:#f1c873;
    --mono:'JetBrains Mono',ui-monospace,monospace; --disp:'Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--disp);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  button{font-family:var(--disp);cursor:pointer}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}::-webkit-scrollbar-track{background:transparent}
  @keyframes ff-spin{to{transform:rotate(360deg)}}
  @keyframes ff-pulse{0%,100%{opacity:.5}50%{opacity:1}}
  @keyframes ff-rad{0%,100%{box-shadow:0 0 8px -2px var(--green)}50%{box-shadow:0 0 22px 2px var(--lime)}}
  .ff-btn:hover{filter:brightness(1.1)} .ff-btn:active{transform:translateY(1px)} .ff-btn:disabled{opacity:.4;cursor:not-allowed}
  @media(max-width:1040px){ .ff-grid{grid-template-columns:1fr!important} }
  @media(max-width:680px){ .ff-line{grid-template-columns:repeat(2,1fr)!important} .ff-ctrls{grid-template-columns:1fr 1fr!important} }
</style>
</helmet>
<div style="min-height:100vh">{{ view }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}">
class Component extends DCLogic {
  state = { tk:0, speed:4, showGuide:true, enrich:4.2, confirm:null };
  KEY='winforge.fuel.state.v2';
  constructor(props){ super(props); const L=this.load(); this.P=(L&&L.P)?L.P:this.fresh(); this.log=(L&&L.log)||[]; this._restored=!!(L&&L.P); if(L&&L.speed)this.state.speed=L.speed; if(L&&L.enrich)this.state.enrich=L.enrich; this._saveN=0; }
  load(){ try{ return JSON.parse(localStorage.getItem(this.KEY)||'null'); }catch(e){ return null; } }
  persist(){ try{ localStorage.setItem(this.KEY, JSON.stringify({P:this.P, log:this.log.slice(0,40), speed:this.state.speed, enrich:this.state.enrich})); }catch(e){} }
  askConfirm(msg,onYes){ this.setState({confirm:{msg,onYes}}); }
  fresh(){
    return {
      cash:600, uf6:60, cladding:40, power:80,
      jobs:[], batch:null, assembliesDone:0, waste:0, wasteCasks:0,
      fuelFiles:[], lastVal:null, elapsed:0, score:0, mIdx:0,
    };
  }
  componentDidMount(){ this.logEvent(this._restored?'Session restored — fabrication state and fuel inventory preserved.':'Fuel fabrication facility online. Convert UF6 → enriched pellets → rods → assemblies, then export a signed .fuel file for the reactor.','info'); if((location.hash||'').toLowerCase().includes('guide')) this.setState({showGuide:true}); this.timer=setInterval(()=>this.step(),100); }
  componentWillUnmount(){ clearInterval(this.timer); }
  logEvent(m,k){ this.log.unshift({t:this.fmtT(this.P.elapsed),msg:m,kind:k||'info',id:Math.random()}); if(this.log.length>120)this.log.pop(); }
  fmtT(s){ s=Math.floor(s); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
  clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  lot(){ return 1000+Math.floor(Math.random()*9000); }
  hash(s){ let h=5381; for(let i=0;i<s.length;i++){ h=((h<<5)+h+s.charCodeAt(i))>>>0; } return 'WF'+h.toString(16); }
  canonFuel(o){ return ['winforge.fuel.v1',o.id,o.enrichment,o.assemblies,o.massKg,o.fabricated,o.issuer].join('|'); }

  step(){
    const P=this.P,dt=0.1*this.state.speed; P.elapsed+=dt;
    P.jobs.forEach(j=>j.t+=dt);
    const done=P.jobs.filter(j=>j.t>=j.dur); done.forEach(j=>this.finishJob(j));
    P.jobs=P.jobs.filter(j=>j.t<j.dur);
    if(P.batch){ P.batch.t+=dt; }
    this.checkMissions();
    if((++this._saveN)%15===0) this.persist();
    this.bump();
  }
  missions(){ return [
    {label:'Stock UF6 and cladding',zh:'備料',check:P=>P.uf6>=8&&P.cladding>=6,reward:60},
    {label:'Start a fabrication batch',zh:'開批',check:P=>!!P.batch||P.assembliesDone>=1,reward:120},
    {label:'Fabricate your first assembly',zh:'首組件',check:P=>P.assembliesDone>=1,reward:220},
    {label:'Fabricate 3 assemblies',zh:'3 組件',check:P=>P.assembliesDone>=3,reward:350},
    {label:'Fabricate 6 assemblies',zh:'6 組件',check:P=>P.assembliesDone>=6,reward:600},
  ]; }
  checkMissions(){ const ms=this.missions(),P=this.P; while(P.mIdx<ms.length && ms[P.mIdx].check(P)){ const m=ms[P.mIdx]; P.score+=m.reward; this.logEvent('🏆 Objective complete: '+m.label+'  +'+m.reward+' pts','good'); P.mIdx++; } }
  missionBar(){
    const h=React.createElement,P=this.P,ms=this.missions(); const m=ms[P.mIdx]; const all=P.mIdx>=ms.length;
    return h('div',{style:{display:'flex',alignItems:'center',gap:13,flexWrap:'wrap',background:'var(--panel)',border:'1px solid var(--line)',borderRadius:11,padding:'9px 14px',marginTop:14}},
      h('span',{style:{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'1px',color:all?'var(--green)':'var(--lime)'}},all?'★ FACILITY MASTERED':'OBJECTIVE '+(P.mIdx+1)+'/'+ms.length),
      h('span',{style:{flex:1,minWidth:160,fontFamily:'var(--disp)',fontWeight:600,fontSize:14}}, all?'All objectives cleared — keep the reactor fuelled.':m.label, m&&!all?h('span',{style:{color:'var(--dim)',fontWeight:400,fontSize:12,marginLeft:8}},m.zh):null),
      m&&!all?h('span',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--lime)'}},'+'+m.reward+' pts'):null,
      h('span',{style:{fontFamily:'var(--mono)',fontSize:12,color:'var(--green)'}},'SCORE ',h('b',{style:{color:'var(--text)'}},P.score)));
  }
  bump(){ this.setState(s=>({tk:s.tk+1})); }

  stages(){ return [
    {key:'convert',name:'Convert UF6 → UO2',zh:'轉換',dur:7,need:{uf6:8}},
    {key:'enrich',name:'Centrifuge enrichment',zh:'離心濃縮',dur:11},
    {key:'pellet',name:'Press & sinter pellets',zh:'壓製燒結',dur:8},
    {key:'rod',name:'Load & weld fuel rods',zh:'裝填焊接',dur:7,need:{cladding:6}},
    {key:'assembly',name:'Build & QA assembly',zh:'組裝品檢',dur:9},
  ]; }
  finishJob(j){}
  gateOk(b){ const st=this.stages()[b.idx]; return b.t>=st.dur; }
  canStart(){ const P=this.P; return !P.batch && P.uf6>=8 && P.cladding>=6 && P.power>10; }
  startBatch(){ if(!this.canStart()){ this.logEvent('Cannot start — need UF6 ≥8, cladding ≥6 and grid power.','warn'); return; } const P=this.P; P.uf6-=8; P.batch={idx:0,t:0,enrich:this.state.enrich,id:'LOT-'+this.lot()}; this.logEvent('Fabrication batch '+P.batch.id+' started at '+this.state.enrich.toFixed(1)+'% target enrichment.','good'); }
  release(){ const P=this.P,b=P.batch; if(!b)return; if(!this.gateOk(b)){ this.logEvent('Stage not complete — wait for the process gate.','warn'); return; }
    const st=this.stages()[b.idx];
    if(st.need && st.need.cladding){ if(P.cladding<st.need.cladding){ this.logEvent('Need cladding tubes for rod loading — buy stock.','warn'); return; } P.cladding-=st.need.cladding; }
    if(b.idx>=this.stages().length-1){ this.mintFuel(b); P.assembliesDone++; P.waste+=4; if(P.waste>=20){ P.wasteCasks++; P.waste-=20; this.logEvent('Spent-fuel / process waste cask sealed (CASK-'+this.lot()+').','warn'); } P.batch=null; }
    else { this.logEvent('Released: '+st.name+' → '+this.stages()[b.idx+1].name+'.','good'); b.idx++; b.t=0; }
  }
  mintFuel(b){
    const now=Date.now();
    const o={ format:'winforge.fuel.v1', id:b.id, enrichment:+b.enrich.toFixed(1), assemblies:1, massKg:523, fabricated:now, issuer:'WinForge Fuel Fab', origin:'web-sim' };
    o.sig=this.hash(this.canonFuel(o)+'WINFORGE-FUEL');
    this.P.fuelFiles.unshift(o); if(this.P.fuelFiles.length>30)this.P.fuelFiles.pop();
    this.logEvent('★ Assembly '+o.id+' fabricated & QA-released — '+o.enrichment+'% enriched, '+o.massKg+'kg. Signed .fuel file ready to download.','good');
  }
  downloadFile(name,text){ try{ const b=new Blob([text],{type:'application/json'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(u);a.remove();},800);}catch(e){ this.logEvent('Download blocked by sandbox — open on GitHub Pages to save.','warn'); } }
  downloadFuel(o){ this.downloadFile(o.id+'.fuel', JSON.stringify(o,null,2)); this.logEvent('Saved '+o.id+'.fuel — load it into the reactor to refuel.','good'); }
  importFuel(e){ const f=e.target.files&&e.target.files[0]; e.target.value=''; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ const o=JSON.parse(r.result); let ok=false,msg; if(o.format!=='winforge.fuel.v1')msg='Not a .fuel file.'; else if(o.sig!==this.hash(this.canonFuel(o)+'WINFORGE-FUEL'))msg='Signature invalid — forged/tampered.'; else {ok=true;msg=o.id+' valid — '+o.enrichment+'% enriched, '+o.assemblies+' assy.';} this.P.lastVal={ok,msg}; this.logEvent((ok?'✓ ':'⛔ ')+'Fuel file '+(ok?'verified: ':'rejected: ')+msg, ok?'good':'crit'); }catch(err){ this.P.lastVal={ok:false,msg:'Unreadable.'}; } this.bump(); }; r.readAsText(f); }
  buy(kind){ const P=this.P; if(kind==='uf6'){ if(P.cash<60){this.logEvent('Need $60.','warn');return;} P.cash-=60; P.uf6+=30; this.logEvent('Received UF6 cylinder shipment (audited).','good'); } if(kind==='clad'){ if(P.cash<40){this.logEvent('Need $40.','warn');return;} P.cash-=40; P.cladding+=24; this.logEvent('Received Zircaloy cladding tubes.','good'); } }
  haulWaste(){ if(this.P.wasteCasks<1){this.logEvent('No sealed casks to ship.','warn');return;} this.P.wasteCasks--; this.P.cash+=15; this.logEvent('Waste cask shipped to dry-cask storage (manifest stamped).','info'); }
  reset(){ this.P=this.fresh(); this.log=[]; this.logEvent('Facility reset.','info'); }
  act(fn){ return e=>{ if(e&&e.preventDefault)e.preventDefault(); fn(); this.bump(); }; }

  renderVals(){ return { view:this.view() }; }
  mode(){ const P=this.P; if(P.batch)return{t:'FABRICATING',c:'var(--lime)'}; if(P.fuelFiles.length)return{t:'READY · assemblies in store',c:'var(--green)'}; return{t:'IDLE',c:'var(--muted)'}; }
  view(){
    const h=React.createElement,P=this.P,m=this.mode();
    return h('div',{style:{maxWidth:1180,margin:'0 auto',padding:'14px clamp(10px,2.5vw,22px) 40px'}},
      this.header(m),
      this.missionBar(),
      h('div',{className:'ff-grid',style:{display:'grid',gridTemplateColumns:'1.5fr 1fr',gap:14,marginTop:14,alignItems:'start'}},
        h('div',{style:{display:'flex',flexDirection:'column',gap:14,minWidth:0}}, this.line(), this.fuelFilesPanel()),
        h('div',{style:{display:'flex',flexDirection:'column',gap:14,minWidth:0}}, this.controls(), this.console())),
      this.state.showGuide?this.guide():null,
      this.state.confirm?this.confirmModal():null);
  }
  confirmModal(){
    const h=React.createElement, c=this.state.confirm;
    return h('div',{style:{position:'fixed',inset:0,zIndex:130,background:'rgba(4,8,6,.72)',display:'grid',placeItems:'center',padding:20},onClick:()=>this.setState({confirm:null})},
      h('div',{onClick:e=>e.stopPropagation(),style:{maxWidth:380,background:'var(--panel)',border:'1px solid var(--line2)',borderRadius:14,padding:'22px 22px 18px',boxShadow:'0 30px 70px -24px #000'}},
        h('div',{style:{fontFamily:'var(--disp)',fontWeight:700,fontSize:17,marginBottom:8}},'Confirm reset'),
        h('p',{style:{color:'var(--muted)',fontSize:14,lineHeight:1.55,margin:'0 0 18px'}},c.msg),
        h('div',{style:{display:'flex',gap:10,justifyContent:'flex-end'}},
          h('button',{onClick:()=>this.setState({confirm:null}),className:'ff-btn',style:{background:'var(--panel3)',color:'var(--muted)',border:'1px solid var(--line2)',borderRadius:8,padding:'9px 16px',fontFamily:'var(--disp)',fontWeight:600,fontSize:13}},'Cancel'),
          h('button',{onClick:()=>{ const f=c.onYes; this.setState({confirm:null}); if(f)f(); },className:'ff-btn',style:{background:'var(--red)',color:'#fff',border:'none',borderRadius:8,padding:'9px 16px',fontFamily:'var(--disp)',fontWeight:700,fontSize:13}},'Reset'))));
  }
  panel(title,right,body,accent){ const h=React.createElement; return h('div',{style:{background:'var(--panel)',border:'1px solid var(--line)',borderRadius:12,overflow:'hidden'}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,padding:'9px 13px',borderBottom:'1px solid var(--line)',background:'var(--panel2)'}},
      h('span',{style:{fontFamily:'var(--mono)',fontSize:11,letterSpacing:'1.2px',color:accent||'var(--green)',textTransform:'uppercase'}},title), right||null),
    h('div',{style:{padding:13}},body)); }

  header(m){
    const h=React.createElement,P=this.P;
    const spd=v=>h('button',{key:v,onClick:this.act(()=>this.setState({speed:v})),className:'ff-btn',style:{background:this.state.speed===v?'var(--green)':'var(--panel3)',color:this.state.speed===v?'#04140a':'var(--muted)',border:'none',borderRadius:6,padding:'5px 9px',fontFamily:'var(--mono)',fontSize:11,fontWeight:700}},v+'×');
    return h('div',{style:{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',background:'var(--panel)',border:'1px solid var(--line)',borderRadius:12,padding:'10px 14px'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10,flex:1,minWidth:200}},
        h('span',{style:{width:34,height:34,borderRadius:8,display:'grid',placeItems:'center',background:'radial-gradient(circle,var(--lime),#10221a)',fontSize:18,animation:P.batch?'ff-rad 1.4s infinite':'none'}},'⬡'),
        h('div',null,
          h('div',{style:{fontFamily:'var(--disp)',fontWeight:700,fontSize:16,lineHeight:1}},'Nuclear Fuel Factory ',h('span',{style:{color:'var(--dim)',fontSize:12,fontWeight:500}},'核燃料工廠')),
          h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:m.c,marginTop:3,display:'flex',alignItems:'center',gap:6}}, h('span',{style:{width:8,height:8,borderRadius:'50%',background:m.c,animation:'ff-pulse 2s infinite'}}), m.t, h('span',{style:{color:'var(--dim)'}},' · T+'+this.fmtT(P.elapsed))))),
      h('div',{style:{textAlign:'right'}},h('div',{style:{fontFamily:'var(--disp)',fontWeight:700,fontSize:16,color:'var(--gold)'}},'$'+Math.round(P.cash)),h('div',{style:{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)'}},'BUDGET')),
      h('div',{style:{textAlign:'right'}},h('div',{style:{fontFamily:'var(--disp)',fontWeight:700,fontSize:16,color:'var(--lime)'}},P.assembliesDone),h('div',{style:{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)'}},'ASSEMBLIES')),
      h('div',{style:{display:'flex',gap:4}}, spd(1),spd(4),spd(16)),
      h('button',{onClick:this.act(()=>this.setState(s=>({showGuide:!s.showGuide}))),className:'ff-btn',style:{background:'var(--panel3)',color:'var(--muted)',border:'1px solid var(--line2)',borderRadius:7,padding:'7px 11px',fontFamily:'var(--mono)',fontSize:11}},'? GUIDE'),
      h('button',{onClick:this.act(()=>this.askConfirm('Reset the facility? Feedstock, fabricated assemblies and signed .fuel files will be cleared.', ()=>this.reset())),className:'ff-btn',style:{background:'var(--panel3)',color:'var(--muted)',border:'1px solid var(--line2)',borderRadius:7,padding:'7px 11px',fontFamily:'var(--mono)',fontSize:11}},'↺'));
  }

  line(){
    const h=React.createElement,P=this.P,b=P.batch,stages=this.stages();
    const seg=(st,i)=>{ const active=b&&b.idx===i,doneS=b&&b.idx>i; const frac=active?this.clamp(b.t/st.dur,0,1):(doneS?1:0);
      return h('div',{key:st.key,style:{flex:'1 1 0',minWidth:0,background:active?'var(--panel3)':'var(--panel2)',border:'1px solid '+(active?'var(--lime)':'var(--line)'),borderRadius:9,padding:'9px 7px',opacity:b?(doneS?.5:1):.8}},
        h('div',{style:{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)'}},'0'+(i+1)),
        h('div',{style:{fontFamily:'var(--disp)',fontWeight:600,fontSize:11.5,lineHeight:1.15,margin:'2px 0 5px',color:active?'var(--lime)':'var(--text)'}},st.name),
        h('div',{style:{fontFamily:'var(--mono)',fontSize:9,color:'var(--dim)',marginBottom:5}},st.zh),
        h('div',{style:{height:5,borderRadius:3,background:'var(--bg)',overflow:'hidden'}},h('div',{style:{height:'100%',width:(frac*100)+'%',background:doneS?'var(--green)':'var(--lime)',transition:'width .2s'}}))); };
    const right=b?h('span',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--lime)'}},b.id+' · '+b.enrich.toFixed(1)+'%'):h('span',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}},'idle');
    return this.panel('Fabrication Line · 製造生產線', right,
      h('div',null,
        h('div',{className:'ff-line',style:{display:'flex',gap:6,marginBottom:11}},stages.map(seg)),
        h('div',{style:{display:'flex',gap:9,flexWrap:'wrap',alignItems:'center'}},
          h('button',{onClick:this.act(()=>this.startBatch()),disabled:!this.canStart(),className:'ff-btn',style:{background:'var(--green)',color:'#04140a',border:'none',borderRadius:8,padding:'9px 15px',fontFamily:'var(--disp)',fontWeight:700,fontSize:13}}, b?'Batch running…':'Start fabrication batch'),
          h('button',{onClick:this.act(()=>this.release()),disabled:!b||!this.gateOk(b),className:'ff-btn',style:{background:b&&this.gateOk(b)?'var(--lime)':'var(--panel3)',color:b&&this.gateOk(b)?'#04140a':'var(--dim)',border:'1px solid var(--line2)',borderRadius:8,padding:'9px 15px',fontFamily:'var(--disp)',fontWeight:700,fontSize:13}}, b&&b.idx>=stages.length-1?'Release → QA assembly':'Release step ▸'),
          h('div',{style:{display:'flex',alignItems:'center',gap:7}},
            h('span',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}},'ENRICH '+this.state.enrich.toFixed(1)+'%'),
            h('input',{type:'range',min:3,max:5,step:0.1,value:this.state.enrich,onChange:e=>{this.setState({enrich:+e.target.value});},style:{width:90}}))))
      ,'var(--lime)');
  }

  fuelFilesPanel(){
    const h=React.createElement,P=this.P;
    const rows=P.fuelFiles.length?P.fuelFiles.slice(0,6).map(o=>h('div',{key:o.id,style:{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',background:'var(--panel2)',border:'1px solid var(--line2)',borderRadius:8}},
      h('span',{style:{fontSize:16}},'⬡'),
      h('div',{style:{flex:1,minWidth:0}},
        h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--lime)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},o.id+'.fuel'),
        h('div',{style:{fontFamily:'var(--mono)',fontSize:9.5,color:'var(--dim)'}},o.enrichment+'% · '+o.massKg+'kg · signed')),
      h('button',{onClick:this.act(()=>this.downloadFuel(o)),className:'ff-btn',style:{background:'var(--panel3)',border:'1px solid var(--line2)',borderRadius:7,padding:'6px 10px',fontFamily:'var(--mono)',fontSize:10.5,color:'var(--green)'}},'⤓ Save')))
      :h('div',{style:{color:'var(--dim)',fontSize:13,padding:'4px 0'}},'No assemblies yet. Run a fabrication batch to mint a signed .fuel file.');
    return this.panel('Signed Fuel Files · .fuel', h('span',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}},P.fuelFiles.length+' fabricated'),
      h('div',null,
        h('div',{style:{display:'flex',flexDirection:'column',gap:7,marginBottom:11}},rows),
        h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
          h('input',{ref:this._fi||(this._fi=React.createRef()),type:'file',accept:'.fuel,.json',style:{display:'none'},onChange:e=>this.importFuel(e)}),
          h('button',{onClick:this.act(()=>{if(this._fi&&this._fi.current)this._fi.current.click();}),className:'ff-btn',style:{background:'var(--panel3)',border:'1px solid var(--line2)',borderRadius:8,padding:'8px 13px',fontFamily:'var(--mono)',fontSize:11.5,color:'var(--lime)'}},'⤒ Verify a .fuel file'),
          h('a',{href:'Reactor.dc.html',target:'_blank',rel:'noopener',className:'ff-btn',style:{background:'var(--panel3)',border:'1px solid var(--cyan)',borderRadius:8,padding:'8px 13px',fontFamily:'var(--mono)',fontSize:11.5,color:'var(--cyan)',textDecoration:'none'}},'☢ Open reactor to load fuel ↗'),
          P.lastVal?h('span',{style:{fontFamily:'var(--mono)',fontSize:11,color:P.lastVal.ok?'var(--green)':'var(--red)'}}, (P.lastVal.ok?'✓ ':'⛔ ')+P.lastVal.msg):null)),
      'var(--lime)');
  }

  controls(){
    const h=React.createElement,P=this.P;
