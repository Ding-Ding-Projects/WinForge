<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080a0d; --panel:#0f1318; --panel2:#151a21; --panel3:#1c232c;
    --line:#232b35; --line2:#323c49;
    --text:#e7ecf2; --muted:#93a0b0; --dim:#5f6b79;
    --cyan:#33d6e0; --amber:#ffb020; --green:#46d17a; --red:#ff4d44; --orange:#ff7a1a; --violet:#9b8cff;
    --mono:'JetBrains Mono',ui-monospace,monospace; --disp:'Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--disp);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  button{font-family:var(--disp);cursor:pointer}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}::-webkit-scrollbar-track{background:transparent}
  @keyframes rx-flow{to{background-position:-28px 0}}
  @keyframes rx-flowv{to{background-position:0 -28px}}
  @keyframes rx-blink{0%,49%{opacity:1}50%,100%{opacity:.2}}
  @keyframes rx-pulse{0%,100%{opacity:.5}50%{opacity:1}}
  @keyframes rx-spin{to{transform:rotate(360deg)}}
  @keyframes rx-shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,-1px)}}
  .rx-flow{background-image:repeating-linear-gradient(90deg,currentColor 0 7px,transparent 7px 14px);background-size:28px 100%;animation:rx-flow .6s linear infinite}
  .rx-flowv{background-image:repeating-linear-gradient(180deg,currentColor 0 7px,transparent 7px 14px);background-size:100% 28px;animation:rx-flowv .6s linear infinite}
  .rx-btn:hover{filter:brightness(1.12)}
  .rx-btn:active{transform:translateY(1px)}
  @media(max-width:1040px){ .rx-grid{grid-template-columns:1fr!important} .rx-side{order:-1} }
  @media(max-width:680px){ .rx-controls{grid-template-columns:1fr 1fr!important} .rx-gauges{grid-template-columns:1fr 1fr!important} }
</style>
</helmet>
<div style="min-height:100vh">{{ view }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}">
class Component extends DCLogic {
  state = { tk:0, speed:4, showGuide:true, muted:true, alarmTab:'log', confirm:null };
  KEY='winforge.reactor.state.v2';

  constructor(props){
    super(props);
    const L=this.load();
    this.P = (L&&L.P) ? L.P : this.fresh();
    this.hist = []; this.log = (L&&L.log)||[];
    this._restored = !!(L&&L.P);
    if(L&&L.speed) this.state.speed=L.speed;
    if(L&&typeof L.muted==='boolean') this.state.muted=L.muted;
    this.fuelInput = React.createRef(); this._saveN=0;
  }
  load(){ try{ return JSON.parse(localStorage.getItem(this.KEY)||'null'); }catch(e){ return null; } }
  persist(){ try{ localStorage.setItem(this.KEY, JSON.stringify({P:this.P, log:this.log.slice(0,40), speed:this.state.speed, muted:this.state.muted})); }catch(e){} }
  askConfirm(msg,onYes){ this.setState({confirm:{msg,onYes}}); }
  fresh(){
    return {
      rcp:false, heaters:false,
      rods:0, boron:1400, power:1e-6, fuel:100, energyGWh:0,
      fuelT:38, modT:38, coldLeg:38, hotLeg:38, pressure:24,
      turbineRoll:false, rpm:0, synced:false, gridMW:0,
      xenon:0, tripped:false, melted:false, scram:'', decay:0, achieved:false,
      elapsed:0, holdRod:0, holdBoron:0, score:0, mIdx:0,
    };
  }
  componentDidMount(){
    this.logEvent(this._restored ? 'Session restored from your last visit — plant state preserved.' : 'Plant in COLD SHUTDOWN. Follow the checklist to start up.', 'info');
    if((location.hash||'').toLowerCase().includes('guide')) this.setState({showGuide:true});
    this.timer = setInterval(()=>this.step(), 100);
  }
  componentWillUnmount(){ clearInterval(this.timer); if(this.osc){try{this.osc.stop()}catch(e){}} }

  logEvent(msg, kind){
    const t = this.fmtT(this.P.elapsed);
    this.log.unshift({t, msg, kind:kind||'info', id:Math.random()});
    if(this.log.length>120) this.log.pop();
  }
  fmtT(s){ s=Math.floor(s); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

  // ---------------- SIMULATION ----------------
  step(){
    const P = this.P;
    if(P.melted){ this.bump(); return; }
    const dt = 0.1 * this.state.speed;
    P.elapsed += dt;

    // hold-button ramps
    if(P.holdRod){ P.rods = this.clamp(P.rods + P.holdRod*22*dt, 0, 100); }
    if(P.holdBoron){ P.boron = this.clamp(P.boron + P.holdBoron*55*dt, 0, 2000); }

    // ---- Reactivity ----
    const rodRho = (P.rods/100)*0.075;
    const boronRho = -(P.boron/1400)*0.045;
    const xenonRho = -0.03*P.xenon;
    const PCOEF = 0.05; // power defect (Doppler+moderator lumped, negative)
    let rhoCtrl = rodRho + boronRho;
    if(P.tripped) rhoCtrl = -0.25; // rods slammed
    const rhoNet = rhoCtrl - PCOEF*P.power + xenonRho;

    // ---- Point-kinetics-ish power ----
    const TAU = 0.6, S = 1.2e-6;
    if(P.tripped){
      // decay heat after trip
      P.decay = Math.max(0, P.decay - P.decay*0.012*dt);
      P.power = Math.max(P.decay, S);
    } else {
      let dP = (rhoNet/TAU)*P.power*dt + S*dt;
      P.power = Math.max(S, P.power + dP);
      P.power = Math.min(P.power, 2.2);
      // fuel burnup limits achievable power
      const fuelCap = 0.15 + (P.fuel/100)*1.05;
      if(P.power>fuelCap) P.power = fuelCap;
    }
    // ---- Fuel burnup ----
    if(!P.tripped){ P.fuel=Math.max(0,P.fuel - P.power*0.045*dt); P.energyGWh += P.power*3400*dt/3600/1000; }

    // ---- Xenon (slow, gentle) ----
    const xeEq = Math.min(1, P.power);
    P.xenon += (xeEq - P.xenon)*0.012*dt;

    // ---- Thermal ----
    const thMW = P.power*3400;
    const flow = P.rcp ? 1 : 0.015;
    if(P.rcp || P.power<0.02){
      const modTarget = (P.rcp ? 38 + (P.heaters?222:120)*(P.pressure>80?1:.4) : 38) + 30*P.power;
      P.modT += (modTarget - P.modT)*Math.min(1,0.06*dt*(P.rcp?3:1));
      const fuelTarget = P.modT + 680*P.power;
      P.fuelT += (fuelTarget - P.fuelT)*Math.min(1,0.12*dt);
    } else {
      // loss of cooling: heat accumulates
      P.fuelT += (thMW*0.06 + (P.tripped?P.decay*3400*0.06:0))*dt;
      P.modT  += (thMW*0.018 + 0.6)*dt;
    }
    P.fuelT = Math.max(P.modT, P.fuelT);
    const spread = P.rcp ? 18*P.power+ (P.power>0.01?6:0) : 2;
    P.coldLeg = P.modT - spread; P.hotLeg = P.modT + spread;

    // ---- Pressure ----
    let pTarget = 24;
    if(P.heaters) pTarget = 158;
    pTarget += (P.modT-200)*0.04;
    if(!P.rcp && P.power>0.05) pTarget += P.fuelT*0.03; // overheat pressurization
    P.pressure += (pTarget - P.pressure)*Math.min(1,0.14*dt);
    if(P.pressure>170){ P.pressure -= (P.pressure-168)*0.3; } // relief valve

    // ---- Secondary / turbine ----
    const steamReady = P.rcp && P.modT>240 && P.power>0.04;
    if(P.turbineRoll && steamReady && !P.tripped){
      P.rpm += (1800 - P.rpm)*Math.min(1,0.04*dt) + 4*dt;
    } else if(!steamReady || P.tripped){
      P.rpm -= P.rpm*Math.min(1,0.06*dt);
      if(P.rpm<10){ P.rpm=0; if(P.synced){ P.synced=false; this.logEvent('Generator separated from grid.','warn'); } }
    }
    P.rpm = this.clamp(P.rpm, 0, 1950);
    if(P.synced){
      const target = P.power*1100;
      P.gridMW += (target - P.gridMW)*Math.min(1,0.05*dt);
      P.gridMW = this.clamp(P.gridMW,0,1250);
    } else { P.gridMW = Math.max(0, P.gridMW - P.gridMW*0.2); }

    // ---- Protection system ----
    if(!P.tripped && !P.melted){
      let cause='';
      if(P.power>1.18) cause='OVERPOWER ΔT (>118%)';
      else if(P.fuelT>2400) cause='HIGH FUEL TEMPERATURE';
      else if(P.pressure<128 && P.power>0.08) cause='LOW PRESSURIZER PRESSURE';
      else if(P.pressure>172) cause='HIGH PRESSURIZER PRESSURE';
      else if(P.modT>345) cause='HIGH COOLANT TEMPERATURE';
      else if(!P.rcp && P.power>0.15) cause='LOSS OF RCP FLOW';
      else if(P.fuel<=1.5 && P.power>0.05) cause='FUEL DEPLETED — reload assemblies';
      if(cause) this.trip(cause, true);
    }
    // meltdown
    if(P.fuelT>2865 && !P.melted){
      P.melted=true; P.power=0; this.logEvent('CORE MELTDOWN — fuel cladding failure. (Simulation only.)','crit'); this.beep(true);
    }
    // goal
    if(!P.achieved && P.synced && P.gridMW>1000 && P.power>0.95){
      P.achieved=true; this.logEvent('★ FULL POWER — 1,100 MWe synchronized to the grid. Well operated.','good'); this.beep(false,'good');
    }

    // ---- status bus for Cake Factory ----
    if(this._busN==null) this._busN=0; this._busN++;
    if(this._busN%10===0){
      try{ localStorage.setItem('winforge.reactor.v1', JSON.stringify({generating:P.synced&&P.gridMW>50, mw:Math.round(P.gridMW), pct:+(P.power*100).toFixed(1), melted:P.melted, ts:Date.now()})); }catch(e){}
    }
    this.checkMissions();
    // history
    this.hist.push(P.power); if(this.hist.length>160) this.hist.shift();
    if((++this._saveN)%15===0) this.persist();
    this.bump();
  }
  bump(){ this.setState(s=>({tk:s.tk+1})); }
  clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  trip(cause, auto){
    const P=this.P; if(P.tripped) return;
    P.tripped=true; P.scram=cause; P.rods=0; P.holdRod=0; P.turbineRoll=false;
    P.decay = Math.max(0.065*P.power, 0.001);
    this.logEvent((auto?'⚡ AUTOMATIC REACTOR TRIP (SCRAM): ':'⚡ MANUAL SCRAM: ')+cause+'. Rods inserted; decay heat present — keep cooling.', auto?'crit':'warn');
    this.beep(true);
  }

  // ---------------- AUDIO ----------------
  ensureAudio(){
    if(this.actx || this.state.muted) return;
    try{ this.actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  beep(alarm, kind){
    if(this.state.muted) return; this.ensureAudio(); if(!this.actx) return;
    try{
      const o=this.actx.createOscillator(), g=this.actx.createGain();
      o.type='square'; o.frequency.value = kind==='good'?660:(alarm?440:520);
      g.gain.value=0.0001; o.connect(g); g.connect(this.actx.destination);
      const t=this.actx.currentTime; o.start(t);
      g.gain.exponentialRampToValueAtTime(0.08,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+ (alarm?0.5:0.25));
      o.stop(t+0.6);
    }catch(e){}
  }

  // ---------------- ACTIONS ----------------
  act(fn){ return (e)=>{ if(e&&e.preventDefault)e.preventDefault(); this.ensureAudio(); fn(); this.bump(); }; }
  setRodHold(d){ return ()=>{ if(this.P.tripped||this.P.melted)return; this.P.holdRod=d; }; }
  clearHold(){ this.P.holdRod=0; this.P.holdBoron=0; }
  setBoronHold(d){ return ()=>{ if(this.P.melted)return; this.P.holdBoron=d; }; }
  toggleRcp(){ this.P.rcp=!this.P.rcp; this.logEvent('Reactor coolant pumps '+(this.P.rcp?'STARTED — primary flow established.':'STOPPED.'), this.P.rcp?'info':'warn'); }
  toggleHeaters(){ this.P.heaters=!this.P.heaters; this.logEvent('Pressurizer heaters '+(this.P.heaters?'ON — pressurizing to 158 bar.':'OFF.'),'info'); }
  rollTurbine(){ if(this.P.tripped)return; this.P.turbineRoll=!this.P.turbineRoll; this.logEvent('Turbine '+(this.P.turbineRoll?'roll initiated — accelerating to 1800 rpm.':'roll secured.'),'info'); }
  syncGrid(){ const P=this.P; if(P.synced){P.synced=false;this.logEvent('Generator output breaker opened.','warn');return;} if(Math.abs(P.rpm-1800)<60){ P.synced=true; this.logEvent('Generator SYNCHRONIZED to grid at 1800 rpm.','good'); } else { this.logEvent('Cannot sync — turbine not at 1800 rpm.','warn'); } }
  reset(){ this.P=this.fresh(); this.hist=[]; this.log=[]; this.logEvent('Plant reset to COLD SHUTDOWN.','info'); }
  // ---- fuel file (shared format with Fuel Factory) ----
  hash(s){ let h=5381; for(let i=0;i<s.length;i++){ h=((h<<5)+h+s.charCodeAt(i))>>>0; } return 'WF'+h.toString(16); }
  canonFuel(o){ return ['winforge.fuel.v1',o.id,o.enrichment,o.assemblies,o.massKg,o.fabricated,o.issuer].join('|'); }
  loadFuel(e){
    const f=e.target.files&&e.target.files[0]; e.target.value='';
    if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{
      const o=JSON.parse(r.result);
      if(o.format!=='winforge.fuel.v1') throw 'fmt';
      if(o.sig!==this.hash(this.canonFuel(o)+'WINFORGE-FUEL')){ this.logEvent('⛔ Fuel assembly '+(o.id||'?')+' REJECTED — signature invalid (forged or tampered).','crit'); this.bump(); return; }
      const add=this.clamp((o.assemblies||1)*22*((o.enrichment||4)/4),5,100);
      this.P.fuel=this.clamp(this.P.fuel+add,0,100);
      this.logEvent('✓ Loaded '+o.id+' — '+o.assemblies+' assemblies @ '+o.enrichment+'% enrichment. Core refueled +'+Math.round(add)+'%.','good');
    }catch(err){ this.logEvent('⛔ File rejected — not a valid WinForge .fuel file.','crit'); } this.bump(); };
    r.readAsText(f);
  }
  scenario(s){
    const P=this.P;
    if(s==='loca'){ if(!P.rcp){this.logEvent('Start the RCPs first.','warn');return;} this.logEvent('SCENARIO: small-break LOCA — pressure falling.','warn'); P.pressure=130; P.boron=Math.min(2000,P.boron); }
    if(s==='lof'){ this.logEvent('SCENARIO: loss of one RCP — flow degraded.','warn'); if(P.rcp){ P.rcp=false; } }
    if(s==='turbtrip'){ this.logEvent('SCENARIO: turbine trip.','warn'); P.turbineRoll=false; P.synced=false; }
  }

  // ---------------- MODE ----------------
  mode(){
    const P=this.P;
    if(P.melted) return {t:'CORE MELTDOWN', c:'var(--red)'};
    if(P.tripped) return {t:'REACTOR TRIPPED', c:'var(--red)'};
    if(P.synced && P.power>0.9) return {t:'AT FULL POWER', c:'var(--green)'};
    if(P.synced) return {t:'ON GRID · ASCENDING', c:'var(--green)'};
    if(P.power>0.02) return {t:'POWER OPERATION', c:'var(--amber)'};
    if(P.power>0.0008) return {t:'CRITICAL · STARTUP', c:'var(--amber)'};
    if(P.rcp && P.modT>240) return {t:'HOT STANDBY', c:'var(--cyan)'};
    if(P.rcp) return {t:'HEATUP', c:'var(--cyan)'};
    return {t:'COLD SHUTDOWN', c:'var(--muted)'};
  }
  missions(){ return [
    {label:'Reach hot standby (Tavg ≥ 250°C)',zh:'達到熱待機',check:P=>P.rcp&&P.modT>=250,reward:100},
    {label:'Take the reactor critical',zh:'達到臨界',check:P=>P.power>0.01,reward:150},
    {label:'Roll the turbine to 1800 rpm',zh:'渦輪併網轉速',check:P=>P.rpm>1750,reward:150},
    {label:'Synchronize to the grid',zh:'併網',check:P=>P.synced,reward:250},
    {label:'Reach 100% power on the grid',zh:'滿功率',check:P=>P.synced&&P.power>0.95,reward:400},
    {label:'Generate 2.0 GWh of electricity',zh:'發電 2 GWh',check:P=>P.energyGWh>=2,reward:600},
  ]; }
  checkMissions(){ const ms=this.missions(),P=this.P; while(P.mIdx<ms.length && ms[P.mIdx].check(P)){ const m=ms[P.mIdx]; P.score+=m.reward; this.logEvent('🏆 Objective complete: '+m.label+'  +'+m.reward+' pts','good'); this.beep(false,'good'); P.mIdx++; } }
  missionBar(){
    const h=React.createElement,P=this.P,ms=this.missions(); const m=ms[P.mIdx]; const all=P.mIdx>=ms.length;
    return h('div',{style:{display:'flex',alignItems:'center',gap:13,flexWrap:'wrap',background:'var(--panel)',border:'1px solid var(--line)',borderRadius:11,padding:'9px 14px',marginTop:14}},
      h('span',{style:{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'1px',color:all?'var(--green)':'var(--amber)'}},all?'★ CAMPAIGN COMPLETE':'OBJECTIVE '+(P.mIdx+1)+'/'+ms.length),
      h('span',{style:{flex:1,minWidth:160,fontFamily:'var(--disp)',fontWeight:600,fontSize:14}}, all?'All objectives cleared — keep the plant on the grid.':m.label, m&&!all?h('span',{style:{color:'var(--dim)',fontWeight:400,fontSize:12,marginLeft:8}},m.zh):null),
      m&&!all?h('span',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--amber2)'}},'+'+m.reward+' pts'):null,
      h('span',{style:{fontFamily:'var(--mono)',fontSize:12,color:'var(--cyan)'}},'SCORE ',h('b',{style:{color:'var(--text)'}},P.score)));
  }
  fuelColor(t){ if(t<150)return '#2a3340'; if(t<400)return '#7a4a12'; if(t<900)return '#c4630a'; if(t<1600)return '#ff7a1a'; if(t<2400)return '#ffb020'; return '#fff1c4'; }

  // ---------------- RENDER ----------------
  renderVals(){ return { view: this.view() }; }

  view(){
    const h=React.createElement, P=this.P, m=this.mode();
    return h('div',{style:{maxWidth:1320,margin:'0 auto',padding:'14px clamp(10px,2.5vw,22px) 40px'}},
      this.header(m),
      this.missionBar(),
      h('div',{className:'rx-grid',style:{display:'grid',gridTemplateColumns:'1.55fr 1fr',gap:14,marginTop:14,alignItems:'start'}},
        h('div',{style:{display:'flex',flexDirection:'column',gap:14,minWidth:0}}, this.mimic(), this.gauges()),
        h('div',{className:'rx-side',style:{display:'flex',flexDirection:'column',gap:14,minWidth:0}}, this.controls(), this.annunciator(), this.console())
      ),
      this.state.showGuide ? this.guide() : null,
      P.melted ? this.meltdown() : null,
      this.state.confirm ? this.confirmModal() : null
    );
  }
  confirmModal(){
    const h=React.createElement, c=this.state.confirm;
    return h('div',{style:{position:'fixed',inset:0,zIndex:130,background:'rgba(4,6,9,.72)',display:'grid',placeItems:'center',padding:20},onClick:()=>this.setState({confirm:null})},
      h('div',{onClick:e=>e.stopPropagation(),style:{maxWidth:380,background:'var(--panel)',border:'1px solid var(--line2)',borderRadius:14,padding:'22px 22px 18px',boxShadow:'0 30px 70px -24px #000'}},
        h('div',{style:{fontFamily:'var(--disp)',fontWeight:700,fontSize:17,marginBottom:8}},'Confirm'),
        h('p',{style:{color:'var(--muted)',fontSize:14,lineHeight:1.55,margin:'0 0 18px'}},c.msg),
        h('div',{style:{display:'flex',gap:10,justifyContent:'flex-end'}},
          h('button',{onClick:()=>this.setState({confirm:null}),className:'rx-btn',style:{background:'var(--panel3)',color:'var(--muted)',border:'1px solid var(--line2)',borderRadius:8,padding:'9px 16px',fontFamily:'var(--disp)',fontWeight:600,fontSize:13}},'Cancel'),
          h('button',{onClick:()=>{ const f=c.onYes; this.setState({confirm:null}); if(f)f(); },className:'rx-btn',style:{background:'linear-gradient(180deg,#ff5a50,#c8241b)',color:'#fff',border:'none',borderRadius:8,padding:'9px 16px',fontFamily:'var(--disp)',fontWeight:700,fontSize:13}},'Reset plant'))));
  }

  panel(title, right, body, accent){
    const h=React.createElement;
    return h('div',{style:{background:'var(--panel)',border:'1px solid var(--line)',borderRadius:12,overflow:'hidden'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,padding:'9px 13px',borderBottom:'1px solid var(--line)',background:'var(--panel2)'}},
        h('span',{style:{fontFamily:'var(--mono)',fontSize:11,letterSpacing:'1.5px',color:accent||'var(--cyan)',textTransform:'uppercase'}},title),
        right||null),
      h('div',{style:{padding:'13px'}}, body));
  }

  header(m){
    const h=React.createElement, P=this.P;
    const spd=(v)=>h('button',{key:v,onClick:this.act(()=>this.setState({speed:v})),className:'rx-btn',style:{background:this.state.speed===v?'var(--cyan)':'var(--panel3)',color:this.state.speed===v?'#04181a':'var(--muted)',border:'none',borderRadius:6,padding:'5px 9px',fontFamily:'var(--mono)',fontSize:11,fontWeight:700}},v+'×');
    return h('div',{style:{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',background:'var(--panel)',border:'1px solid var(--line)',borderRadius:12,padding:'10px 14px'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10,flex:1,minWidth:200}},
        h('span',{style:{width:34,height:34,borderRadius:8,display:'grid',placeItems:'center',background:'radial-gradient(circle,'+this.fuelColor(P.fuelT)+',#1a0f02)',fontSize:18,boxShadow:'0 0 18px -2px '+this.fuelColor(P.fuelT)}},'☢'),
        h('div',null,
          h('div',{style:{fontFamily:'var(--disp)',fontWeight:700,fontSize:16,lineHeight:1}},'PWR Control Room ',h('span',{style:{color:'var(--dim)',fontSize:12,fontWeight:500}},'核反應堆')),

        h('div',{style:{fontFamily:'var(--mono)',fontSize:13,color:'var(--amber)',margin:'8px 0 4px'}},'核心熔毀 · fuel exceeded 2865°C'),
        h('p',{style:{color:'var(--muted)',fontSize:13.5,lineHeight:1.6}},'Cooling could not remove decay heat. In WinForge this is simulation-only and never touches real hardware — the real-PC effect is OFF by default.'),
        h('button',{onClick:this.act(()=>this.reset()),className:'rx-btn',style:{marginTop:14,background:'linear-gradient(180deg,#ff5a50,#c8241b)',color:'#fff',border:'none',borderRadius:9,padding:'12px 26px',fontFamily:'var(--disp)',fontWeight:700,fontSize:15}},'↺ Restart plant')));
  }
}
