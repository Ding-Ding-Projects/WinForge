  *{box-sizing:border-box}

  @keyframes app-pulse{0%,100%{opacity:.5}50%{opacity:1}}

</style>
</helmet>

              h('span',{style:{position:'absolute',top:3,left:on?23:3,width:18,height:18,borderRadius:'50%',background:on?'#1a0e00':'var(--muted)',transition:'left .18s'}}))
          : h('button',{onClick:()=>this.pressFeature(f,false),className:'app-btn',style:{flexShrink:0,background:'var(--card2)',border:'1px solid var(--line2)',borderRadius:8,padding:'8px 16px',color:'var(--accent2)',fontWeight:600,fontSize:13}},'Run ▸')),
      open&&out?h('pre',{style:{margin:'11px 0 0',background:'#0c0c0f',border:'1px solid var(--line)',borderRadius:8,padding:'11px 13px',fontFamily:'var(--mono)',fontSize:11.5,lineHeight:1.55,color:'var(--muted)',whiteSpace:'pre-wrap',overflow:'auto'}},
        out.map((l,i)=>h('div',{key:i,style:{color:l[0]==='✓'?'var(--green)':(l[0]==='›'?'var(--accent2)':'var(--muted)')}},l))):null);
  }

  // ---- Generic module ----
  vModule(m){
    const h=React.createElement; const pid='__m_'+m.page; const out=this.outputs[pid]; const pressed=this.pressedId===pid;
    const actions=['Run','Refresh','Export results'];
    return this.shell(h('div',null,
      h('div',{style:{fontFamily:'var(--mono)',fontSize:11.5,color:'var(--dim)',marginBottom:10}}, h('a',{href:'#/page/dashboard',style:{color:'var(--muted)'}},'Dashboard'),' / ',m.en),
      this.pageHead(m.en, m.zh, 'Wraps '+m.engine+' — entirely in-app, no redirects.'),
      h('div',{className:pressed?'app-card-press':'',style:{background:'var(--card)',border:'1px solid '+(pressed?'var(--accent)':'var(--line)'),borderRadius:12,padding:'16px 18px'}},
        h('div',{style:{display:'flex',gap:18,flexWrap:'wrap',fontFamily:'var(--mono)',fontSize:12,color:'var(--muted)',marginBottom:14}},
          h('span',null,'page: ',h('b',{style:{color:'var(--accent)'}},'--page '+m.page)), h('span',null,'service: '+(m.service||'—')), h('span',null,'status: '+(m.status||'✅'))),
        h('div',{style:{display:'flex',gap:9,flexWrap:'wrap'}}, actions.map((a,i)=>h('button',{key:i,onClick:()=>this.pressModule(m,false),className:'app-btn',style:{background:i===0?'var(--accent)':'var(--card2)',color:i===0?'#1a0e00':'var(--text)',border:'1px solid '+(i===0?'var(--accent)':'var(--line2)'),borderRadius:8,padding:'9px 16px',fontWeight:600,fontSize:13}},a))),
        out?h('pre',{style:{margin:'14px 0 0',background:'#0c0c0f',border:'1px solid var(--line)',borderRadius:8,padding:'12px 14px',fontFamily:'var(--mono)',fontSize:12,lineHeight:1.6,whiteSpace:'pre-wrap',overflow:'auto'}}, out.map((l,i)=>h('div',{key:i,style:{color:l[0]==='✓'?'var(--green)':(l[0]==='›'?'var(--accent2)':'var(--muted)')}},l))):null)));
  }

  // ---- Sim embed ----
  vSim(id){
    const h=React.createElement; const map={reactor:['Reactor.dc.html','Nuclear Reactor','核反應堆'],cakefactory:['CakeFarm.dc.html','Cake Factory & Farm','蛋糕工廠與農場'],fuelfactory:['FuelFactory.dc.html','Nuclear Fuel Factory','核燃料工廠']}; const it=map[id];
    return h('div',{className:'app-in',style:{height:'100%',display:'flex',flexDirection:'column'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderBottom:'1px solid var(--line)',flexShrink:0}},
        h('span',{style:{fontWeight:600,fontSize:14}},it[1],' ',h('span',{style:{color:'var(--dim)',fontWeight:400,fontSize:12}},it[2])),
        h('span',{style:{flex:1}}),
        h('a',{href:it[0],target:'_blank',rel:'noopener',className:'app-btn',style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted)',textDecoration:'none',border:'1px solid var(--line)',borderRadius:6,padding:'5px 10px'}},'Pop out ↗')),
      h('iframe',{src:it[0],title:it[1],style:{flex:1,width:'100%',border:'none',background:'var(--content)'}}));
  }

  // ---- AI page ----
  vAi(){ return this.vModule({en:'AI Agents',zh:'AI 代理',page:'aiagents',pageFile:'Pages/AiAgentsModule',service:'Services/AgentRunner',engine:'autonomous agent runner — YOLO mode consumes a signed .cake',status:'✅'}); }

  // ---- Settings ----
  vSettings(){
    const h=React.createElement;
    const row=(t,zh,ctrl)=>h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,padding:'14px 16px',background:'var(--card)',border:'1px solid var(--line)',borderRadius:11}},h('div',null,h('div',{style:{fontWeight:600,fontSize:14}},t),h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--dim)'}},zh)),ctrl);
    const seg=(opts)=>h('div',{style:{display:'inline-flex',background:'var(--bg)',border:'1px solid var(--line)',borderRadius:8,padding:3,gap:3}},opts.map((o,i)=>h('button',{key:i,onClick:()=>this.toast('Setting changed (simulated)','ok'),className:'app-btn',style:{background:i===0?'var(--accent)':'transparent',color:i===0?'#1a0e00':'var(--muted)',border:'none',borderRadius:6,padding:'6px 13px',fontSize:12.5,fontWeight:600}},o)));
    return this.shell(h('div',null, this.pageHead('Settings','設定','Language, theme and import/export.'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        row('App theme','應用程式佈景', seg(['Dark','Light','System'])),
        row('Language','語言', seg(['Bilingual','粵語','English'])),
        row('Close to system tray','關閉時收入系統匣', seg(['On','Off'])),
        row('Meltdown → real PC shutdown','熔毀關機', seg(['Off (sim)','On'])))));
  }

  // ---- Search ----
  searchDropdown(){
    if(!this.state.sqOpen || this.state.sq.trim().length<1) return null;
    const h=React.createElement; const res=this.searchResults(this.state.sq).slice(0,8); const col={module:'var(--accent)',category:'var(--accent2)',tweak:'var(--green)'};
    const items=res.length?res.map((it,i)=>h('a',{key:i,href:it.go,onMouseDown:()=>this.setState({sqOpen:false,sq:''}),className:'app-navitem',style:{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderBottom:'1px solid var(--line)',textDecoration:'none',color:'var(--text)'}},
      h('span',{style:{fontFamily:'var(--mono)',fontSize:9,padding:'2px 6px',borderRadius:4,background:'var(--bg)',color:col[it.type],textTransform:'uppercase',flexShrink:0}},it.type),
      h('span',{style:{flex:1,minWidth:0}},h('div',{style:{fontSize:13,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},it.t),h('div',{style:{fontSize:11,color:'var(--dim)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},it.zh||it.sub)),
      it.type==='tweak'?h('span',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--green)',flexShrink:0}},'run▸'):null)):[h('div',{key:'n',style:{padding:14,color:'var(--dim)',fontSize:13}},'No matches.')];
    return h('div',{style:{position:'absolute',top:'calc(100% + 6px)',left:0,right:0,background:'var(--card2)',border:'1px solid var(--line2)',borderRadius:10,overflow:'hidden',boxShadow:'0 22px 50px -18px #000',zIndex:80,maxHeight:'70vh',overflowY:'auto'}},items);
  }
  searchResults(q){
    const ql=(q||'').toLowerCase(); const res=[]; if(!ql.trim()) return res;
    (this.D.modules||[]).forEach(m=>{ if((m.en+m.zh+m.page+m.engine).toLowerCase().includes(ql)) res.push({type:'module',t:m.en,zh:m.zh,sub:m.engine,go:'#/page/'+m.page}); });
    (this.D.categories||[]).forEach(c=>{ const sl=this.slug(c.en); if((c.en+c.zh).toLowerCase().includes(ql)) res.push({type:'category',t:c.en,zh:c.zh,sub:c.count+' features',go:'#/cat/'+sl}); c.features.forEach(f=>{ if((f.en+f.zh+f.id).toLowerCase().includes(ql)) res.push({type:'tweak',t:f.en,zh:f.zh,sub:c.en,go:'#/run/'+sl+'/'+f.id}); }); });
    return res;
  }
  vSearch(q){
    const h=React.createElement; q=decodeURIComponent(q||this.state.q);
    const res=this.searchResults(q);
    const col={module:'var(--accent)',category:'var(--accent2)',tweak:'var(--green)'};
    return this.shell(h('div',null,
      this.pageHead('Search','搜尋', res.length+' results for “'+q+'”'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:8}}, res.slice(0,300).map((it,i)=>h('a',{key:i,href:it.go,className:'app-btn',style:{display:'flex',alignItems:'center',gap:12,background:'var(--card)',border:'1px solid var(--line)',borderRadius:9,padding:'11px 14px',textDecoration:'none',color:'var(--text)'}},
        h('span',{style:{fontFamily:'var(--mono)',fontSize:9.5,padding:'3px 7px',borderRadius:5,background:'var(--bg)',color:col[it.type],textTransform:'uppercase'}},it.type),
        h('span',{style:{flex:1,minWidth:0}},h('div',{style:{fontWeight:600,fontSize:14}},it.t,h('span',{style:{color:'var(--dim)',fontWeight:400}},'  ·  '+it.zh)),h('div',{style:{fontSize:12,color:'var(--dim)'}},it.sub)),
        it.type==='tweak'?h('span',{style:{fontFamily:'var(--mono)',fontSize:10.5,color:'var(--green)'}},'run ▸'):h('span',{style:{color:'var(--dim)'}},'›'))))));
  }

  toastTray(){
    const h=React.createElement;
    return h('div',{style:{position:'fixed',right:18,bottom:18,zIndex:90,display:'flex',flexDirection:'column',gap:9,alignItems:'flex-end'}},
      this.toasts.map(t=>h('div',{key:t.id,style:{animation:'app-toast .25s ease both',display:'flex',alignItems:'center',gap:10,background:'var(--card2)',border:'1px solid '+(t.kind==='ok'?'var(--green)':'var(--line2)'),borderRadius:10,padding:'11px 15px',boxShadow:'0 14px 34px -16px #000',maxWidth:340}},
        h('span',{style:{color:t.kind==='ok'?'var(--green)':'var(--accent)'}},'✓'), h('span',{style:{fontSize:13}},t.msg))));
  }
}
</script>
