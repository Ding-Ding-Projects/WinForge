name: Regenerate real site data from the app

# Keeps the GitHub Pages site's data REAL: whenever the app's module/category/feature
# surface changes, build WinForge on Windows, run its --export-site-data exporter, and
# commit the regenerated design/winforge-data.js. That commit touches design/** which
# triggers the Pages deploy workflow — so the published site always reflects the app's
# actual capabilities (no hand-written numbers). Simulators are untouched.
#
# Loop-safe: triggers ONLY on app-source paths (not design/**), and the data commit it
# pushes only touches design/**, so it never re-triggers itself. GitHub suppresses
# push workflows for GITHUB_TOKEN commits, so this workflow explicitly dispatches
# the managed release workflow after a generated-data push. The generated commit
# therefore receives the same tested .NET installer release as an ordinary push.

on:
  push:
    branches: [main]
    paths:
      - "Services/ModuleRegistry.cs"
      - "Services/DocsExporter.cs"
      - "Catalog/**"
      - "Models/Core.cs"
      - "docs/wiki/**"
      - "tools/regen-site-data.ps1"
      - ".github/workflows/site-data.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: site-data
  # A run may push generated data before dispatching its matching managed release.
  # Keep queued runs alive so every successful base-repository push gets a release.
  cancel-in-progress: false

jobs:
  regen:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET 11 preview
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "11.0.x"
          dotnet-quality: preview

      - name: Restore
        # Restore the canonical managed publish target explicitly.
        run: dotnet restore WinForge.csproj -p:Platform=x64 -r win-x64

      - name: Publish WinForge (self-contained x64)
        shell: pwsh
        run: |
          dotnet publish WinForge.csproj -c Release -p:Platform=x64 -r win-x64 --self-contained true `
            -p:WindowsAppSDKSelfContained=true -p:WindowsPackageType=None -p:PublishTrimmed=false
          if ($LASTEXITCODE -ne 0) { throw "publish failed" }

      - name: Locate publish folder
        id: pub
        shell: pwsh
        run: |
          $pub = Get-ChildItem -Path bin -Recurse -Directory -Filter publish |
            Where-Object { $_.FullName -match 'Release' -and $_.FullName -match 'win-x64' } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $pub -or -not (Test-Path "$pub\WinForge.exe")) { throw "publish folder / WinForge.exe not found" }
          "dir=$pub" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Regenerate real managed-app site data (tolerant)
        continue-on-error: true
        shell: pwsh
        run: |
          try { & "$PWD/tools/regen-site-data.ps1" -ExePath "${{ steps.pub.outputs.dir }}\WinForge.exe" }
          catch { Write-Warning "Regen failed; keeping committed data. $_" }

      - name: Commit refreshed data if it changed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          git config user.name  "winforge-bot"
          git config user.email "winforge@users.noreply.github.com"
          # Stage first so Git applies the repository's line-ending normalization.
          # A CRLF-only worktree observation can disappear from the index; only a
          # real staged delta is eligible for a commit and follow-on release.
          git add -- design/winforge-data.js
          if ($LASTEXITCODE -ne 0) { throw 'site-data staging failed' }
          git diff --cached --quiet -- design/winforge-data.js
          $stagedDiffExitCode = $LASTEXITCODE
          if ($stagedDiffExitCode -eq 0) {
            Write-Host "No change to design/winforge-data.js."
            exit 0
          }
          if ($stagedDiffExitCode -ne 1) {
            throw "site-data staged diff check failed with exit code $stagedDiffExitCode"
          }
          git commit -m "chore: regenerate real site data from the app [auto]"
          if ($LASTEXITCODE -ne 0) { throw 'site-data commit failed' }
          # Rebase onto any commits that landed while we were building, then push.
          git pull --rebase origin main
          if ($LASTEXITCODE -ne 0) { throw 'site-data rebase failed' }
          $pushedSha = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0 -or $pushedSha -notmatch '^[0-9a-f]{40}$') {
            throw "could not resolve exact site-data commit: $pushedSha"
          }
          git push origin HEAD:main
          if ($LASTEXITCODE -ne 0) { throw 'site-data push failed' }
          # GITHUB_TOKEN pushes do not emit another push workflow. workflow_dispatch
          # is the supported recursion-safe exception, and this runs only after a
          # real generated-data commit reaches main.
          # The managed release workflow derives a Windows-safe, retry-stable
          # v1.1.x tag from its own workflow run number.
          $dispatchArgs = @(
            'workflow', 'run', 'release.yml',
            '--ref', 'main',
            '-f', "source_sha=$pushedSha"
          )
          $dispatchSucceeded = $false
          $lastDispatchFailure = ''
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            $dispatchOutput = (& gh @dispatchArgs 2>&1 | Out-String)
            if ($LASTEXITCODE -eq 0) {
              $dispatchSucceeded = $true
              break
            }
            $lastDispatchFailure = $dispatchOutput.Trim()
            Write-Warning "Managed release dispatch attempt $attempt/5 failed: $lastDispatchFailure"
            if ($attempt -lt 5) {
              Start-Sleep -Seconds ([int][Math]::Min(30, [Math]::Pow(2, $attempt)))
            }
          }
          if (-not $dispatchSucceeded) {
            throw "managed release dispatch failed after 5 attempts: $lastDispatchFailure"
          }
