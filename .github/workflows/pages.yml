name: Deploy design to GitHub Pages

# Publishes the WinForge UI design (design/) to GitHub Pages. Runs on every push to
# main that touches the design (so future "design syncs" auto-publish), and can be
# triggered manually. This is the design/UI sync target — the live design site.
on:
  push:
    branches: [main]
    paths:
      - 'design/**'
      - '.github/workflows/pages.yml'
  # The site-data workflow commits design/winforge-data.js using GITHUB_TOKEN, and
  # GitHub deliberately does NOT let token-authored commits trigger further workflows
  # (loop prevention). So a plain push trigger misses the auto-regenerated data and the
  # live site goes stale. Chain off that workflow's completion to always redeploy.
  workflow_run:
    workflows: ["Regenerate real site data from the app"]
    types: [completed]
  workflow_dispatch:

# Least-privilege token for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # For the workflow_run chain, only deploy when the data regen actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload design as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: design

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
