name: Native C++ CI & Installer · 原生 C++ CI 同安裝程式

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create a GitHub release from this run / 由此執行建立 GitHub 版本'
        required: false
        default: false
        type: boolean
      source_sha:
        description: 'Optional exact main commit to build / 可選：要建置嘅確切 main commit'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build-test-package:
    name: Build, smoke test & package native C++ · 建置、煙霧測試同封裝原生 C++
    # Pin the VS 2022 image because the native app deliberately targets v143.
    # `windows-latest` has moved to VS 2026, where that UWP compatibility
    # toolset is not present by default.
    runs-on: windows-2022

    steps:
      - name: Resolve immutable source commit · 解析不可變來源提交
        id: source
        shell: pwsh
        env:
          EVENT_SOURCE_SHA: ${{ github.sha }}
          REQUESTED_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          $requestedSha = ([string]$env:REQUESTED_SOURCE_SHA).Trim()
          $expectedSha = if ($requestedSha) { $requestedSha } else { ([string]$env:EVENT_SOURCE_SHA).Trim() }
          if ($expectedSha -notmatch '^[0-9a-fA-F]{40}$') {
            throw "source SHA must be a complete 40-character commit ID: $expectedSha"
          }
          $expectedSha = $expectedSha.ToLowerInvariant()
          "sha=$expectedSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Checkout · 取出原始碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.source.outputs.sha }}

      - name: Verify immutable source commit · 驗證不可變來源提交
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_SOURCE_SHA: ${{ steps.source.outputs.sha }}
          REQUESTED_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          $expectedSha = ([string]$env:EXPECTED_SOURCE_SHA).Trim().ToLowerInvariant()
          $actualSha = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0) { throw 'could not resolve checked-out native source commit' }
          if ($actualSha -ne $expectedSha) {
            throw "native checkout mismatch: expected $expectedSha, got $actualSha"
          }
          git cat-file -e "$expectedSha^{commit}"
          if ($LASTEXITCODE -ne 0) { throw "native source is not a commit: $expectedSha" }

          $requestedSha = ([string]$env:REQUESTED_SOURCE_SHA).Trim()
          if ($env:EVENT_NAME -eq 'workflow_dispatch' -and $requestedSha) {
            git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
            if ($LASTEXITCODE -ne 0) { throw 'could not fetch origin/main for dispatched source validation' }
            git merge-base --is-ancestor $expectedSha refs/remotes/origin/main
            if ($LASTEXITCODE -ne 0) {
              throw "dispatched source commit is not reachable from origin/main: $expectedSha"
            }
          }

      - name: Provision C++ v143 UWP toolset · 準備 C++ v143 UWP 工具組
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $setup = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\setup.exe'
          if (-not (Test-Path -LiteralPath $vswhere) -or -not (Test-Path -LiteralPath $setup)) {
            throw 'Visual Studio discovery or installer is unavailable on this runner'
          }

          $installPath = @(& $vswhere -latest -products * -version '[17.0,18.0)' -requires Microsoft.Component.MSBuild -property installationPath | Select-Object -First 1)[0]
          if ([string]::IsNullOrWhiteSpace($installPath) -or -not (Test-Path -LiteralPath $installPath)) {
            throw 'Could not resolve the Visual Studio installation for the native build'
          }
          $installPath = $installPath.Trim()

          $toolset = Join-Path $installPath 'MSBuild\Microsoft\VC\v170\Application Type\Windows Store\10.0\Platforms\x64\PlatformToolsets\v143\Toolset.props'

          if (-not (Test-Path -LiteralPath $toolset)) {
            & $setup modify --installPath $installPath --add Microsoft.VisualStudio.ComponentGroup.UWP.VC --add Microsoft.VisualStudio.Component.Windows11SDK.26100 --quiet --norestart --wait
            $setupExitCode = $LASTEXITCODE
            if ($setupExitCode -notin @(0, 3010)) { throw "C++ v143 UWP toolset installation failed with exit code $setupExitCode" }
          }

          if (-not (Test-Path -LiteralPath $toolset)) { throw "C++ v143 UWP toolset is still missing after provisioning: $toolset" }
          Write-Host "Using UWP v143 toolset: $toolset"

      - name: Set up MSBuild · 設定 MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'

      - name: Restore native PCRE2 dependency · 還原原生 PCRE2 依賴
        shell: pwsh
        env:
          VCPKG_DISABLE_METRICS: '1'
        run: |
          # The manifest pins a historical builtin baseline, so the clone must
          # retain that commit rather than use a shallow checkout.
          git clone https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          if ($LASTEXITCODE -ne 0) { throw 'vcpkg bootstrap failed' }
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install --triplet x64-windows-static --x-manifest-root="$env:GITHUB_WORKSPACE"
          if ($LASTEXITCODE -ne 0) { throw 'PCRE2 vcpkg install failed' }

      - name: Restore native NuGet packages · 還原原生 NuGet 套件
        shell: pwsh
        run: |
          msbuild WinForge.Native.sln /t:Restore /p:RestorePackagesConfig=true /p:Configuration=Release /p:Platform=x64
          if ($LASTEXITCODE -ne 0) { throw 'native restore failed' }

      - name: Build native Release x64 · 建置原生 Release x64
        shell: pwsh
        run: |
          msbuild WinForge.Native.sln /p:Configuration=Release /p:Platform=x64 /m
          if ($LASTEXITCODE -ne 0) { throw 'native Release build failed' }

      - name: Run native core tests · 執行原生核心測試
        shell: pwsh
        run: |
          $test = 'tests\native\WinForge.Core.Tests\bin\x64\Release\WinForge.Core.Tests.exe'
          if (-not (Test-Path $test)) { throw "native test executable missing: $test" }
          & $test
          if ($LASTEXITCODE -ne 0) { throw 'native core tests failed' }

      - name: Verify catalog parity · 驗證目錄對等
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File eng\native\Test-NativeCatalogParity.ps1
          if ($LASTEXITCODE -ne 0) { throw 'catalog parity failed' }

      # The full UIA shell smoke needs an interactive desktop. It remains a
      # required local/elevated gate (and is run through LowLevel MCP during
      # this migration), but a GitHub-hosted service desktop cannot provide
      # trustworthy WinUI composition or screen-reader geometry evidence.

      - name: Stage native runtime · 整理原生 runtime
        id: runtime
        shell: pwsh
        run: |
          $source = Resolve-Path 'src\WinForge.App\bin\x64\Release'
          if (-not (Test-Path (Join-Path $source 'WinForge.exe'))) { throw 'native WinForge.exe missing' }
          "dir=$source" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $version = "1.0.${{ github.run_number }}"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "WINFORGE_NATIVE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify native installer contract
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File eng\native\Test-NativeInstallerContract.ps1 -PublishDir "${{ steps.runtime.outputs.dir }}"
          if ($LASTEXITCODE -ne 0) { throw 'native installer contract rejected the staged runtime' }

      - name: Portable native zip · 原生可攜 zip
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP "WinForge-native-${{ steps.runtime.outputs.version }}"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          Copy-Item -Path "${{ steps.runtime.outputs.dir }}\*" -Destination $staging -Recurse -Force
          Copy-Item -LiteralPath 'THIRD-PARTY-NOTICES.txt' -Destination $staging -Force
          Compress-Archive -Path "$staging\*" -DestinationPath "WinForge-native-x64-${{ steps.runtime.outputs.version }}.zip" -Force

      - name: Install Inno Setup · 安裝 Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          if ($LASTEXITCODE -ne 0) { throw 'Inno Setup install failed' }

      - name: Build native C++ installer · 建置原生 C++ 安裝程式
        shell: pwsh
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          & $iscc "/DMyAppVersion=${{ steps.runtime.outputs.version }}" "/DMyPublishDir=${{ steps.runtime.outputs.dir }}" 'installer\WinForge.Native.iss'
          if ($LASTEXITCODE -ne 0) { throw 'native Inno Setup build failed' }
          $setups = @(Get-ChildItem installer\out-native -Filter 'WinForge-Native-Setup.exe' -File | Sort-Object FullName)
          if ($setups.Count -ne 1) { throw "expected exactly one native installer, found $($setups.Count)" }
          $setup = $setups[0]
          powershell -NoProfile -ExecutionPolicy Bypass -File eng\native\Test-NativeInstallerContract.ps1 -InstallerPath $setup.FullName
          if ($LASTEXITCODE -ne 0) { throw 'native installer contract rejected the compiled setup executable' }

      - name: Smoke native C++ installer · 靜默測試原生 C++ 安裝程式
        shell: pwsh
        run: |
          $setups = @(Get-ChildItem installer\out-native -Filter 'WinForge-Native-Setup.exe' -File | Sort-Object FullName)
          if ($setups.Count -ne 1) { throw "expected exactly one native installer for smoke test, found $($setups.Count)" }
          $setup = $setups[0]
          $localAppData = [IO.Path]::GetFullPath($env:LOCALAPPDATA)
          $installRoot = [IO.Path]::GetFullPath((Join-Path $localAppData "WinForge-Native-Installer-Smoke-$env:GITHUB_RUN_ID"))
          $allowedPrefix = $localAppData.TrimEnd('\') + '\'
          if (-not $installRoot.StartsWith($allowedPrefix, [StringComparison]::OrdinalIgnoreCase)) {
            throw "installer smoke root escaped LOCALAPPDATA: $installRoot"
          }
          if (Test-Path -LiteralPath $installRoot) {
            throw "installer smoke root already exists unexpectedly: $installRoot"
          }
          try {
            $installer = Start-Process -FilePath $setup.FullName -ArgumentList @(
              '/VERYSILENT',
              '/SUPPRESSMSGBOXES',
              '/NORESTART',
              '/SP-',
              "/DIR=$installRoot"
            ) -Wait -PassThru -NoNewWindow
            if ($installer.ExitCode -ne 0) { throw "native installer exited with $($installer.ExitCode)" }
            $app = Join-Path $installRoot 'WinForge.exe'
            $uninstaller = Join-Path $installRoot 'unins000.exe'
            $notices = Join-Path $installRoot 'THIRD-PARTY-NOTICES.txt'
            if (-not (Test-Path -LiteralPath $app)) { throw "installed native app missing: $app" }
            if (-not (Test-Path -LiteralPath $uninstaller)) { throw "installed native uninstaller missing: $uninstaller" }
            if (-not (Test-Path -LiteralPath $notices)) { throw "installed third-party notices missing: $notices" }
            powershell -NoProfile -ExecutionPolicy Bypass -File eng\native\Test-NativeInstallerContract.ps1 -InstallDir $installRoot
            if ($LASTEXITCODE -ne 0) { throw 'native installer contract rejected the installed payload' }
            $uninstallerProcess = Start-Process -FilePath $uninstaller -ArgumentList @(
              '/VERYSILENT',
              '/SUPPRESSMSGBOXES',
              '/NORESTART'
            ) -Wait -PassThru -NoNewWindow
            if ($uninstallerProcess.ExitCode -ne 0) { throw "native uninstaller exited with $($uninstallerProcess.ExitCode)" }
            if (Test-Path -LiteralPath $installRoot) { throw "native installer smoke left install root behind: $installRoot" }
          }
          finally {
            if (Test-Path -LiteralPath $installRoot) {
              if (-not $installRoot.StartsWith($allowedPrefix, [StringComparison]::OrdinalIgnoreCase)) {
                throw "refusing cleanup outside guarded LOCALAPPDATA root: $installRoot"
              }
              Remove-Item -LiteralPath $installRoot -Recurse -Force
            }
          }

      - name: Upload native artifacts · 上載原生 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WinForge-native-${{ steps.runtime.outputs.version }}
          path: |
            WinForge-native-x64-${{ steps.runtime.outputs.version }}.zip
            installer/out-native/WinForge-Native-Setup.exe
          if-no-files-found: error

      - name: Create native GitHub release · 建立原生 GitHub 版本
        if: (github.event_name == 'push' && github.ref_type == 'branch') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/native-v')) || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF_NAME: ${{ github.ref_name }}
          EVENT_REF_TYPE: ${{ github.ref_type }}
          EXPECTED_SOURCE_SHA: ${{ steps.source.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $expectedSha = ([string]$env:EXPECTED_SOURCE_SHA).Trim().ToLowerInvariant()
          $usePushedNativeTag = $env:EVENT_NAME -eq 'push' -and
            $env:EVENT_REF_TYPE -eq 'tag' -and
            ([string]$env:EVENT_REF_NAME).StartsWith('native-v', [StringComparison]::Ordinal)
          $tag = if ($usePushedNativeTag) { $env:EVENT_REF_NAME } else { "native-v1.0.${{ github.run_number }}" }
          $notes = "Native C++20/WinUI 3 build from commit $expectedSha.`n原生 C++20/WinUI 3 建置，來自 commit $expectedSha。"
          # Native remains a migration preview until the parity ledger is complete.
          # A prerelease publishes every successful branch build without replacing
          # the managed shipping release consumed by /releases/latest.
          # Pin the release tag to the immutable commit that produced these artifacts.
          # Otherwise a concurrent main update can move the default target away
          # from the source SHA even though the release notes identify this run.
          gh release create $tag "WinForge-native-x64-${{ steps.runtime.outputs.version }}.zip" 'installer/out-native/WinForge-Native-Setup.exe' --target "$expectedSha" --title "WinForge Native Preview $tag" --notes $notes --prerelease
          if ($LASTEXITCODE -ne 0) { throw "native release creation failed: $tag" }

          $refJson = (& gh api "repos/$env:GITHUB_REPOSITORY/git/ref/tags/$tag" | Out-String)
          if ($LASTEXITCODE -ne 0) { throw "could not resolve native release tag: $tag" }
          $object = ($refJson | ConvertFrom-Json).object
          for ($depth = 0; $object.type -eq 'tag'; $depth++) {
            if ($depth -ge 8) { throw "native release tag dereference exceeded eight levels: $tag" }
            $tagJson = (& gh api $object.url | Out-String)
            if ($LASTEXITCODE -ne 0) { throw "could not dereference annotated native tag: $tag" }
            $object = ($tagJson | ConvertFrom-Json).object
          }
          if ($object.type -ne 'commit') { throw "native release tag does not resolve to a commit: $tag ($($object.type))" }
          $actualSha = ([string]$object.sha).Trim().ToLowerInvariant()
          if ($actualSha -ne $expectedSha) {
            throw "native release provenance mismatch for ${tag}: expected $expectedSha, got $actualSha"
          }
          Write-Host "Verified native release $tag -> $actualSha"
