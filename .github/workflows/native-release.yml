name: Native C++ CI & Installer · 原生 C++ CI 同安裝程式

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub release from this run / 由此執行建立 GitHub 版本"
        required: false
        default: false
        type: boolean
      source_sha:
        description: "Optional exact main commit to build / 可選：要建置嘅確切 main commit"
        required: false
        default: ""
        type: string
      release_version:
        description: "Optional immutable native delivery version (A.B.C) / 可選：不可變原生發佈版本"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build-test-package:
    name: Build, smoke test & package native C++ · 建置、煙霧測試同封裝原生 C++
    # Pin the VS 2022 image because the native app deliberately targets v143.
    # `windows-latest` has moved to VS 2026, where that UWP compatibility
    # toolset is not present by default.
    runs-on: windows-2022
    permissions:
      contents: read
    outputs:
      source_sha: ${{ steps.source.outputs.sha }}
      version: ${{ steps.runtime.outputs.version }}

    steps:
      - name: Resolve immutable source commit · 解析不可變來源提交
        id: source
        shell: pwsh
        env:
          EVENT_SOURCE_SHA: ${{ github.sha }}
          REQUESTED_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          $requestedSha = ([string]$env:REQUESTED_SOURCE_SHA).Trim()
          $expectedSha = if ($requestedSha) { $requestedSha } else { ([string]$env:EVENT_SOURCE_SHA).Trim() }
          if ($expectedSha -notmatch '^[0-9a-fA-F]{40}$') {
            throw "source SHA must be a complete 40-character commit ID: $expectedSha"
          }
          $expectedSha = $expectedSha.ToLowerInvariant()
          "sha=$expectedSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Checkout · 取出原始碼
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ steps.source.outputs.sha }}

      - name: Verify immutable source commit · 驗證不可變來源提交
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_SOURCE_SHA: ${{ steps.source.outputs.sha }}
          REQUESTED_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          $expectedSha = ([string]$env:EXPECTED_SOURCE_SHA).Trim().ToLowerInvariant()
          $actualSha = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0) { throw 'could not resolve checked-out native source commit' }
          if ($actualSha -ne $expectedSha) {
            throw "native checkout mismatch: expected $expectedSha, got $actualSha"
          }
          git cat-file -e "$expectedSha^{commit}"
          if ($LASTEXITCODE -ne 0) { throw "native source is not a commit: $expectedSha" }

          $requestedSha = ([string]$env:REQUESTED_SOURCE_SHA).Trim()
          if ($env:EVENT_NAME -eq 'workflow_dispatch' -and $requestedSha) {
            git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
            if ($LASTEXITCODE -ne 0) { throw 'could not fetch origin/main for dispatched source validation' }
            git merge-base --is-ancestor $expectedSha refs/remotes/origin/main
            if ($LASTEXITCODE -ne 0) {
              throw "dispatched source commit is not reachable from origin/main: $expectedSha"
            }
          }

      - name: Provision C++ v143 UWP toolset · 準備 C++ v143 UWP 工具組
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $setup = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\setup.exe'
          if (-not (Test-Path -LiteralPath $vswhere) -or -not (Test-Path -LiteralPath $setup)) {
            throw 'Visual Studio discovery or installer is unavailable on this runner'
          }

          $installPath = @(& $vswhere -latest -products * -version '[17.0,18.0)' -requires Microsoft.Component.MSBuild -property installationPath | Select-Object -First 1)[0]
          if ([string]::IsNullOrWhiteSpace($installPath) -or -not (Test-Path -LiteralPath $installPath)) {
            throw 'Could not resolve the Visual Studio installation for the native build'
          }
          $installPath = $installPath.Trim()

          $toolset = Join-Path $installPath 'MSBuild\Microsoft\VC\v170\Application Type\Windows Store\10.0\Platforms\x64\PlatformToolsets\v143\Toolset.props'

          if (-not (Test-Path -LiteralPath $toolset)) {
            & $setup modify --installPath $installPath --add Microsoft.VisualStudio.ComponentGroup.UWP.VC --add Microsoft.VisualStudio.Component.Windows11SDK.26100 --quiet --norestart --wait
            $setupExitCode = $LASTEXITCODE
            if ($setupExitCode -notin @(0, 3010)) { throw "C++ v143 UWP toolset installation failed with exit code $setupExitCode" }
          }

          if (-not (Test-Path -LiteralPath $toolset)) { throw "C++ v143 UWP toolset is still missing after provisioning: $toolset" }
          Write-Host "Using UWP v143 toolset: $toolset"

      - name: Set up MSBuild · 設定 MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          vs-version: "[17.0,18.0)"

      - name: Restore native PCRE2 dependency · 還原原生 PCRE2 依賴
        shell: pwsh
        env:
          VCPKG_DISABLE_METRICS: "1"
        run: |
          # The manifest pins a historical builtin baseline, so the clone must
          # retain that commit rather than use a shallow checkout.
          git clone https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          if ($LASTEXITCODE -ne 0) { throw 'vcpkg bootstrap failed' }
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install --triplet x64-windows-static --x-manifest-root="$env:GITHUB_WORKSPACE"
          if ($LASTEXITCODE -ne 0) { throw 'PCRE2 vcpkg install failed' }

      - name: Restore native NuGet packages · 還原原生 NuGet 套件
        shell: pwsh
        run: |
          msbuild WinForge.Native.sln /t:Restore /p:RestorePackagesConfig=true /p:Configuration=Release /p:Platform=x64
          if ($LASTEXITCODE -ne 0) { throw 'native restore failed' }

      - name: Build native Release x64 · 建置原生 Release x64
        shell: pwsh
        run: |
          msbuild WinForge.Native.sln /p:Configuration=Release /p:Platform=x64 /m
          if ($LASTEXITCODE -ne 0) { throw 'native Release build failed' }

      - name: Run native core tests · 執行原生核心測試
        shell: pwsh
        run: |
          $test = 'tests\native\WinForge.Core.Tests\bin\x64\Release\WinForge.Core.Tests.exe'
          if (-not (Test-Path $test)) { throw "native test executable missing: $test" }
          & $test
          if ($LASTEXITCODE -ne 0) { throw 'native core tests failed' }

      - name: Verify catalog parity · 驗證目錄對等
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File eng\native\Test-NativeCatalogParity.ps1
          if ($LASTEXITCODE -ne 0) { throw 'catalog parity failed' }

      # The full UIA shell smoke needs an interactive desktop. It remains a
      # required local/elevated gate (and is run through LowLevel MCP during
      # this migration), but a GitHub-hosted service desktop cannot provide
      # trustworthy WinUI composition or screen-reader geometry evidence.

      - name: Stage native runtime · 整理原生 runtime
        id: runtime
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF_NAME: ${{ github.ref_name }}
          EVENT_REF_TYPE: ${{ github.ref_type }}
          REQUESTED_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          $source = Resolve-Path 'src\WinForge.App\bin\x64\Release'
          if (-not (Test-Path (Join-Path $source 'WinForge.exe'))) { throw 'native WinForge.exe missing' }

          # Package from one clean runtime-only directory so the portable zip and
          # installer consume the exact same native payload. Build/link symbols,
          # the managed oracle helpers, and .NET hosting files must never escape
          # into a native GitHub release.
          $staging = Join-Path $env:RUNNER_TEMP "WinForge-native-runtime-${{ github.run_id }}-${{ github.run_attempt }}"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          $blockedExtensions = @('.pdb', '.ilk', '.lib', '.exp')
          $blockedNames = @(
            'WinForge.dll',
            'WinForgeLauncher.exe',
            'WinForgeUpdater.exe',
            'coreclr.dll',
            'hostfxr.dll',
            'hostpolicy.dll'
          )

          Get-ChildItem -LiteralPath $source -Recurse -File | ForEach-Object {
            $relative = [IO.Path]::GetRelativePath($source.Path, $_.FullName)
            $segments = @($relative -split '[\\/]')
            $isBlocked = $_.Extension.ToLowerInvariant() -in $blockedExtensions -or
              $_.Name -in $blockedNames -or
              $_.Name.EndsWith('.deps.json', [StringComparison]::OrdinalIgnoreCase) -or
              $_.Name.EndsWith('.runtimeconfig.json', [StringComparison]::OrdinalIgnoreCase) -or
              $segments -contains 'updater-runtime'
            if ($isBlocked) {
              Write-Host "Excluding non-runtime native release file: $relative"
              return
            }

            $destination = Join-Path $staging $relative
            $destinationDirectory = Split-Path -Parent $destination
            New-Item -ItemType Directory -Path $destinationDirectory -Force | Out-Null
            Copy-Item -LiteralPath $_.FullName -Destination $destination -Force
          }

          Copy-Item -LiteralPath 'THIRD-PARTY-NOTICES.txt' -Destination $staging -Force
          if (-not (Test-Path (Join-Path $staging 'WinForge.exe'))) { throw 'staged native WinForge.exe missing' }
          "dir=$staging" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $requestedVersion = ([string]$env:REQUESTED_RELEASE_VERSION).Trim()
          $pushedNativeTagVersion = if (
            $env:EVENT_NAME -eq 'push' -and
            $env:EVENT_REF_TYPE -eq 'tag' -and
            ([string]$env:EVENT_REF_NAME).StartsWith('native-v', [StringComparison]::Ordinal)
          ) {
            ([string]$env:EVENT_REF_NAME).Substring('native-v'.Length)
          }
          else {
            ''
          }
          if ($requestedVersion -and $pushedNativeTagVersion -and $requestedVersion -cne $pushedNativeTagVersion) {
            throw "requested native release version '$requestedVersion' conflicts with pushed tag '$env:EVENT_REF_NAME'"
          }
          $version = if ($requestedVersion) {
            $requestedVersion
          }
          elseif ($pushedNativeTagVersion) {
            $pushedNativeTagVersion
          }
          else {
            "1.0.${{ github.run_number }}"
          }
          if ($version -notmatch '^[1-9][0-9]*\.[0-9]+\.[0-9]+$') {
            throw "invalid native release version: $version"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "WINFORGE_NATIVE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify native installer contract
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File eng\native\Test-NativeInstallerContract.ps1 -PublishDir "${{ steps.runtime.outputs.dir }}"
          if ($LASTEXITCODE -ne 0) { throw 'native installer contract rejected the staged runtime' }

      - name: Portable native zip · 原生可攜 zip
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.runtime.outputs.dir }}\*" -DestinationPath "WinForge-native-x64-${{ steps.runtime.outputs.version }}.zip" -Force

      - name: Install Inno Setup · 安裝 Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          if ($LASTEXITCODE -ne 0) { throw 'Inno Setup install failed' }

      - name: Build native C++ installer · 建置原生 C++ 安裝程式
        shell: pwsh
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          & $iscc "/DMyAppVersion=${{ steps.runtime.outputs.version }}" "/DMyPublishDir=${{ steps.runtime.outputs.dir }}" 'installer\WinForge.Native.iss'
          if ($LASTEXITCODE -ne 0) { throw 'native Inno Setup build failed' }
          $setups = @(Get-ChildItem installer\out-native -Filter 'WinForge-Native-Setup.exe' -File | Sort-Object FullName)
          if ($setups.Count -ne 1) { throw "expected exactly one native installer, found $($setups.Count)" }
          $setup = $setups[0]
          powershell -NoProfile -ExecutionPolicy Bypass -File eng\native\Test-NativeInstallerContract.ps1 -InstallerPath $setup.FullName
          if ($LASTEXITCODE -ne 0) { throw 'native installer contract rejected the compiled setup executable' }

      - name: Smoke native C++ installer · 靜默測試原生 C++ 安裝程式
        shell: pwsh
        run: |
          $setups = @(Get-ChildItem installer\out-native -Filter 'WinForge-Native-Setup.exe' -File | Sort-Object FullName)
          if ($setups.Count -ne 1) { throw "expected exactly one native installer for smoke test, found $($setups.Count)" }
          $setup = $setups[0]
          $localAppData = [IO.Path]::GetFullPath($env:LOCALAPPDATA)
          $installRoot = [IO.Path]::GetFullPath((Join-Path $localAppData "WinForge-Native-Installer-Smoke-$env:GITHUB_RUN_ID"))
          $allowedPrefix = $localAppData.TrimEnd('\') + '\'
          if (-not $installRoot.StartsWith($allowedPrefix, [StringComparison]::OrdinalIgnoreCase)) {
            throw "installer smoke root escaped LOCALAPPDATA: $installRoot"
          }
          if (Test-Path -LiteralPath $installRoot) {
            throw "installer smoke root already exists unexpectedly: $installRoot"
          }
          try {
            $installer = Start-Process -FilePath $setup.FullName -ArgumentList @(
              '/VERYSILENT',
              '/SUPPRESSMSGBOXES',
              '/NORESTART',
              '/SP-',
              "/DIR=$installRoot"
            ) -Wait -PassThru -NoNewWindow
            if ($installer.ExitCode -ne 0) { throw "native installer exited with $($installer.ExitCode)" }
            $app = Join-Path $installRoot 'WinForge.exe'
            $uninstaller = Join-Path $installRoot 'unins000.exe'
            $notices = Join-Path $installRoot 'THIRD-PARTY-NOTICES.txt'
            if (-not (Test-Path -LiteralPath $app)) { throw "installed native app missing: $app" }
            if (-not (Test-Path -LiteralPath $uninstaller)) { throw "installed native uninstaller missing: $uninstaller" }
            if (-not (Test-Path -LiteralPath $notices)) { throw "installed third-party notices missing: $notices" }
            powershell -NoProfile -ExecutionPolicy Bypass -File eng\native\Test-NativeInstallerContract.ps1 -InstallDir $installRoot
            if ($LASTEXITCODE -ne 0) { throw 'native installer contract rejected the installed payload' }
            $uninstallerProcess = Start-Process -FilePath $uninstaller -ArgumentList @(
              '/VERYSILENT',
              '/SUPPRESSMSGBOXES',
              '/NORESTART'
            ) -Wait -PassThru -NoNewWindow
            if ($uninstallerProcess.ExitCode -ne 0) { throw "native uninstaller exited with $($uninstallerProcess.ExitCode)" }
            if (Test-Path -LiteralPath $installRoot) { throw "native installer smoke left install root behind: $installRoot" }
          }
          finally {
            if (Test-Path -LiteralPath $installRoot) {
              if (-not $installRoot.StartsWith($allowedPrefix, [StringComparison]::OrdinalIgnoreCase)) {
                throw "refusing cleanup outside guarded LOCALAPPDATA root: $installRoot"
              }
              Remove-Item -LiteralPath $installRoot -Recurse -Force
            }
          }

      - name: Stage exact native release assets · 整理確切原生發佈檔
        shell: pwsh
        run: |
          $releaseAssets = Join-Path $env:GITHUB_WORKSPACE 'release-assets'
          if (Test-Path -LiteralPath $releaseAssets) {
            throw "native release asset staging directory already exists: $releaseAssets"
          }
          New-Item -ItemType Directory -Path $releaseAssets | Out-Null

          $portableName = "WinForge-native-x64-${{ steps.runtime.outputs.version }}.zip"
          Copy-Item -LiteralPath $portableName -Destination (Join-Path $releaseAssets $portableName) -Force
          Copy-Item -LiteralPath 'installer/out-native/WinForge-Native-Setup.exe' -Destination (Join-Path $releaseAssets 'WinForge-Native-Setup.exe') -Force

          $actualNames = @(Get-ChildItem -LiteralPath $releaseAssets -File | Sort-Object Name | ForEach-Object Name)
          $expectedNames = @('WinForge-Native-Setup.exe', $portableName) | Sort-Object
          if ($actualNames.Count -ne 2 -or (Compare-Object $expectedNames $actualNames)) {
            throw "native release handoff must contain exactly setup + portable zip; found: $($actualNames -join ', ')"
          }

      - name: Upload exact native release assets · 上載確切原生發佈檔
        uses: actions/upload-artifact@v7
        with:
          name: WinForge-native-release-${{ steps.runtime.outputs.version }}
          path: |
            release-assets/WinForge-native-x64-${{ steps.runtime.outputs.version }}.zip
            release-assets/WinForge-Native-Setup.exe
          if-no-files-found: error

  release-native:
    name: Publish trusted native C++ release · 發佈可信原生 C++ 版本
    needs: build-test-package
    if: ${{ needs.build-test-package.result == 'success' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)) }}
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout exact native release source · 取出確切原生發佈來源
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.build-test-package.outputs.source_sha }}

      - name: Verify exact native release source · 驗證確切原生發佈來源
        shell: pwsh
        env:
          EXPECTED_SOURCE_SHA: ${{ needs.build-test-package.outputs.source_sha }}
        run: |
          $expectedSha = ([string]$env:EXPECTED_SOURCE_SHA).Trim().ToLowerInvariant()
          if ($expectedSha -notmatch '^[0-9a-f]{40}$') { throw "invalid release handoff source SHA: $expectedSha" }
          $actualSha = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0 -or $actualSha -ne $expectedSha) {
            throw "trusted release checkout mismatch: expected $expectedSha, got $actualSha"
          }
          git cat-file -e "$expectedSha^{commit}"
          if ($LASTEXITCODE -ne 0) { throw "trusted release source is not a commit: $expectedSha" }

      - name: Download exact native release assets · 下載確切原生發佈檔
        uses: actions/download-artifact@v8
        with:
          name: WinForge-native-release-${{ needs.build-test-package.outputs.version }}
          path: release-assets

      - name: Verify exact native release handoff · 驗證確切原生發佈交接
        shell: pwsh
        env:
          NATIVE_VERSION: ${{ needs.build-test-package.outputs.version }}
        run: |
          $portableName = "WinForge-native-x64-$env:NATIVE_VERSION.zip"
          $actualNames = @(Get-ChildItem -LiteralPath 'release-assets' -Recurse -File | Sort-Object Name | ForEach-Object Name)
          $expectedNames = @('WinForge-Native-Setup.exe', $portableName) | Sort-Object
          if ($actualNames.Count -ne 2 -or (Compare-Object $expectedNames $actualNames)) {
            throw "trusted native release handoff must contain exactly setup + portable zip; found: $($actualNames -join ', ')"
          }
          if ((Get-Item -LiteralPath 'release-assets/WinForge-Native-Setup.exe').Length -le 0 -or
              (Get-Item -LiteralPath "release-assets/$portableName").Length -le 0) {
            throw 'trusted native release handoff contains an empty asset'
          }

      - name: Create sole native GitHub release · 建立唯一原生 GitHub 版本
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF_NAME: ${{ github.ref_name }}
          EVENT_REF_TYPE: ${{ github.ref_type }}
          EXPECTED_SOURCE_SHA: ${{ needs.build-test-package.outputs.source_sha }}
          NATIVE_VERSION: ${{ needs.build-test-package.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $expectedSha = ([string]$env:EXPECTED_SOURCE_SHA).Trim().ToLowerInvariant()
          $usePushedNativeTag = $env:EVENT_NAME -eq 'push' -and
            $env:EVENT_REF_TYPE -eq 'tag' -and
            ([string]$env:EVENT_REF_NAME).StartsWith('native-v', [StringComparison]::Ordinal)
          $tag = if ($usePushedNativeTag) { $env:EVENT_REF_NAME } else { "native-v$env:NATIVE_VERSION" }
          $notes = "Native C++20/WinUI 3 build from commit $expectedSha.`n原生 C++20/WinUI 3 建置，來自 commit $expectedSha。"
          $portableAsset = "release-assets/WinForge-native-x64-$env:NATIVE_VERSION.zip"
          $installerAsset = 'release-assets/WinForge-Native-Setup.exe'
          $expectedAssetNames = @(
            [System.IO.Path]::GetFileName($installerAsset),
            [System.IO.Path]::GetFileName($portableAsset)
          ) | Sort-Object

          function Get-ReleasePostconditionErrors {
            param(
              [Parameter(Mandatory)]$Release,
              [Parameter(Mandatory)][string]$ExpectedTag,
              [Parameter(Mandatory)][string]$ExpectedSha,
              [Parameter(Mandatory)][bool]$ExpectedPrerelease,
              [Parameter(Mandatory)][string[]]$ExpectedAssets
            )

            $errors = [System.Collections.Generic.List[string]]::new()
            if ([string]$Release.tag_name -cne $ExpectedTag) {
              $errors.Add("tag expected '$ExpectedTag', got '$($Release.tag_name)'")
            }
            if (([string]$Release.target_commitish).Trim().ToLowerInvariant() -cne $ExpectedSha) {
              $errors.Add("target expected '$ExpectedSha', got '$($Release.target_commitish)'")
            }
            if ([bool]$Release.draft) {
              $errors.Add('release is unexpectedly a draft')
            }
            if ([bool]$Release.prerelease -ne $ExpectedPrerelease) {
              $errors.Add("prerelease expected '$ExpectedPrerelease', got '$($Release.prerelease)'")
            }

            $actualAssets = @($Release.assets | ForEach-Object { [string]$_.name } | Sort-Object)
            if ($actualAssets.Count -ne $ExpectedAssets.Count -or
                ($actualAssets.Count -eq $ExpectedAssets.Count -and
                  (Compare-Object -ReferenceObject $ExpectedAssets -DifferenceObject $actualAssets -CaseSensitive))) {
              $errors.Add(("assets expected '{0}', got '{1}'" -f ($ExpectedAssets -join ', '), ($actualAssets -join ', ')))
            }
            return @($errors)
          }

          function Get-NativeLatestPostconditionErrors {
            param(
              [Parameter(Mandatory)]$Release,
              [Parameter(Mandatory)][string]$ExpectedSha,
              [string]$ExpectedTag = ''
            )

            $errors = [System.Collections.Generic.List[string]]::new()
            $tagName = [string]$Release.tag_name
            if ($ExpectedTag -and $tagName -cne $ExpectedTag) {
              $errors.Add("Latest tag expected '$ExpectedTag', got '$tagName'")
            }
            $nativeTag = [System.Text.RegularExpressions.Regex]::Match(
              $tagName,
              '^native-v(?<version>[0-9]+\.[0-9]+\.[0-9]+)$',
              [System.Text.RegularExpressions.RegexOptions]::CultureInvariant)
            if (-not $nativeTag.Success) {
              $errors.Add("Latest tag is not a versioned native release: '$tagName'")
            }
            if (([string]$Release.target_commitish).Trim().ToLowerInvariant() -cne $ExpectedSha) {
              $errors.Add("Latest target expected '$ExpectedSha', got '$($Release.target_commitish)'")
            }
            if ([bool]$Release.draft) {
              $errors.Add('Latest release is unexpectedly a draft')
            }
            if ([bool]$Release.prerelease) {
              $errors.Add('Latest release is unexpectedly a prerelease')
            }

            $actualAssets = @($Release.assets | ForEach-Object { [string]$_.name } | Sort-Object)
            $expectedLatestAssets = if ($nativeTag.Success) {
              @(
                'WinForge-Native-Setup.exe',
                "WinForge-native-x64-$($nativeTag.Groups['version'].Value).zip"
              ) | Sort-Object
            }
            else {
              @('WinForge-Native-Setup.exe', '<invalid-native-version>.zip') | Sort-Object
            }
            if ($actualAssets.Count -ne 2 -or
                (Compare-Object -ReferenceObject $expectedLatestAssets -DifferenceObject $actualAssets -CaseSensitive)) {
              $errors.Add(("Latest assets expected '{0}', got '{1}'" -f ($expectedLatestAssets -join ', '), ($actualAssets -join ', ')))
            }
            return @($errors)
          }

          function Invoke-GhWithRetry {
            param(
              [Parameter(Mandatory)][string]$Description,
              [Parameter(Mandatory)][string[]]$Arguments,
              [int]$Attempts = 6
            )

            $lastFailure = ''
            for ($attempt = 1; $attempt -le $Attempts; $attempt++) {
              $output = (& gh @Arguments 2>&1 | Out-String)
              if ($LASTEXITCODE -eq 0) { return $output }

              $lastFailure = $output.Trim()
              Write-Warning "$Description failed on attempt $attempt/${Attempts}: $lastFailure"
              if ($attempt -lt $Attempts) {
                Start-Sleep -Seconds ([Math]::Min(20, 2 * [int][Math]::Pow(2, $attempt - 1)))
              }
            }
            throw "$Description failed after ${Attempts} attempts: $lastFailure"
          }

          function Get-ReleaseByTagWithRetry {
            param(
              [Parameter(Mandatory)][string]$Tag,
              [int]$Attempts = 6,
              [switch]$WaitForVisibility
            )

            $lastFailure = ''
            for ($attempt = 1; $attempt -le $Attempts; $attempt++) {
              $output = (& gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$Tag" 2>&1 | Out-String)
              if ($LASTEXITCODE -eq 0) {
                return ($output | ConvertFrom-Json -ErrorAction Stop)
              }

              $lastFailure = $output.Trim()
              if ($lastFailure -match '(HTTP 404|Not Found|"status"\s*:\s*404)') {
                if (-not $WaitForVisibility) { return $null }
                Write-Warning "Native release '$Tag' is not visible yet on attempt $attempt/${Attempts}."
                if ($attempt -lt $Attempts) {
                  Start-Sleep -Seconds ([Math]::Min(20, 2 * [int][Math]::Pow(2, $attempt - 1)))
                  continue
                }
                return $null
              }
              Write-Warning "Native release lookup for '$Tag' failed on attempt $attempt/${Attempts}: $lastFailure"
              if ($attempt -lt $Attempts) {
                Start-Sleep -Seconds ([Math]::Min(20, 2 * [int][Math]::Pow(2, $attempt - 1)))
              }
            }
            throw "could not read native release '$Tag' after ${Attempts} attempts: $lastFailure"
          }

          # Refresh main immediately before creation to classify this run. Every
          # stable main release starts with --latest=false; only the current tip
          # may be promoted after a second fresh origin/main check.
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          if ($LASTEXITCODE -ne 0) { throw 'could not refresh origin/main before native release creation' }
          $currentMainSha = (git rev-parse refs/remotes/origin/main).Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0 -or $currentMainSha -notmatch '^[0-9a-f]{40}$') {
            throw "could not resolve current origin/main tip: $currentMainSha"
          }

          $isMainChannel = $env:EVENT_REF_TYPE -eq 'branch' -and
            $env:EVENT_REF_NAME -eq 'main' -and
            $env:EVENT_NAME -in @('push', 'workflow_dispatch')
          $isCurrentMainTip = $isMainChannel -and $expectedSha -eq $currentMainSha
          $title = if ($isMainChannel) { "WinForge Native $tag" } else { "WinForge Native Preview $tag" }
          $releaseArgs = @(
            'release', 'create', $tag,
            $portableAsset,
            $installerAsset,
            '--target', $expectedSha,
            '--title', $title,
            '--notes', $notes
          )
          if ($isMainChannel) {
            $releaseArgs += '--latest=false'
          }
          else {
            $releaseArgs += '--prerelease'
          }

          # Pin the release tag to the immutable commit that produced these artifacts.
          # Otherwise a concurrent main update can move the default target away
          # from the source SHA even though the release notes identify this run.
          $existingRelease = Get-ReleaseByTagWithRetry -Tag $tag
          if ($null -eq $existingRelease) {
            # Do not retry `gh release create`: a 503 or lost response may mean
            # GitHub accepted it. Re-read once with bounded retry and let the
            # exact tag/provenance/asset checks below decide whether it is safe.
            $createOutput = (& gh @releaseArgs 2>&1 | Out-String)
            if ($LASTEXITCODE -ne 0) {
              $existingRelease = Get-ReleaseByTagWithRetry -Tag $tag -WaitForVisibility
              if ($null -eq $existingRelease) {
                throw "native release creation failed for ${tag}: $($createOutput.Trim())"
              }
              Write-Warning "Native release create returned an error, but '$tag' exists; reconciling exact postconditions."
            }
          }
          else {
            Write-Host "Native release '$tag' already exists; reconciling exact postconditions."
          }

          # `gh release create --latest` has returned success without moving the
          # REST /releases/latest pointer. The official edit command is therefore
          # the only promotion path, and it never uploads another asset.
          $shouldVerifyLatest = $false
          if ($isCurrentMainTip) {
            git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
            if ($LASTEXITCODE -ne 0) { throw 'could not refresh origin/main before native Latest promotion' }
            $promotionMainSha = (git rev-parse refs/remotes/origin/main).Trim().ToLowerInvariant()
            if ($LASTEXITCODE -ne 0 -or $promotionMainSha -notmatch '^[0-9a-f]{40}$') {
              throw "could not resolve origin/main before native Latest promotion: $promotionMainSha"
            }
            if ($expectedSha -ne $promotionMainSha) {
              Write-Host "Native release $tag is intentionally non-Latest because main advanced to $promotionMainSha."
            }
            else {
              Invoke-GhWithRetry -Description "native Latest promotion for $tag" `
                -Arguments @('release', 'edit', $tag, '--latest', '--prerelease=false', '--draft=false') | Out-Null
              $shouldVerifyLatest = $true
            }
          }
          else { Write-Host "Native release $tag is intentionally non-Latest because it is not the current main tip." }

          $refJson = Invoke-GhWithRetry -Description "native release tag lookup for $tag" `
            -Arguments @('api', "repos/$env:GITHUB_REPOSITORY/git/ref/tags/$tag")
          $object = ($refJson | ConvertFrom-Json).object
          for ($depth = 0; $object.type -eq 'tag'; $depth++) {
            if ($depth -ge 8) { throw "native release tag dereference exceeded eight levels: $tag" }
            $tagJson = Invoke-GhWithRetry -Description "native annotated tag lookup for $tag" `
              -Arguments @('api', [string]$object.url)
            $object = ($tagJson | ConvertFrom-Json).object
          }
          if ($object.type -ne 'commit') { throw "native release tag does not resolve to a commit: $tag ($($object.type))" }
          $actualSha = ([string]$object.sha).Trim().ToLowerInvariant()
          if ($actualSha -ne $expectedSha) {
            throw "native release provenance mismatch for ${tag}: expected $expectedSha, got $actualSha"
          }

          $releaseJson = Invoke-GhWithRetry -Description "native release readback for $tag" `
            -Arguments @('api', "repos/$env:GITHUB_REPOSITORY/releases/tags/$tag")
          $release = $releaseJson | ConvertFrom-Json -ErrorAction Stop
          $expectedPrerelease = -not $isMainChannel
          $actualAssetNames = @($release.assets | ForEach-Object { [string]$_.name })
          $missingAssetNames = @($expectedAssetNames | Where-Object { $actualAssetNames -notcontains $_ })
          $unexpectedAssetNames = @($actualAssetNames | Where-Object { $expectedAssetNames -notcontains $_ })
          $releaseMetadataMatches =
            ([string]$release.tag_name -ceq $tag) -and
            (([string]$release.target_commitish).Trim().ToLowerInvariant() -ceq $expectedSha) -and
            (-not [bool]$release.draft) -and
            ([bool]$release.prerelease -eq $expectedPrerelease)
          if ($releaseMetadataMatches -and $unexpectedAssetNames.Count -eq 0 -and $missingAssetNames.Count -gt 0) {
            $assetPaths = @{
              ([System.IO.Path]::GetFileName($installerAsset)) = $installerAsset
              ([System.IO.Path]::GetFileName($portableAsset)) = $portableAsset
            }
            foreach ($missingAssetName in $missingAssetNames) {
              $missingAssetPath = [string]$assetPaths[$missingAssetName]
              if (-not $missingAssetPath) { throw "no native handoff path is available for missing asset: $missingAssetName" }
              Invoke-GhWithRetry -Description "native release asset reconciliation for $missingAssetName" `
                -Arguments @('release', 'upload', $tag, $missingAssetPath, '--clobber') | Out-Null
            }
            $releaseJson = Invoke-GhWithRetry -Description "native release reconciled readback for $tag" `
              -Arguments @('api', "repos/$env:GITHUB_REPOSITORY/releases/tags/$tag")
            $release = $releaseJson | ConvertFrom-Json -ErrorAction Stop
          }
          $releaseErrors = @(Get-ReleasePostconditionErrors `
            -Release $release `
            -ExpectedTag $tag `
            -ExpectedSha $expectedSha `
            -ExpectedPrerelease $expectedPrerelease `
            -ExpectedAssets $expectedAssetNames)
          if ($releaseErrors.Count -ne 0) {
            throw "native release postcondition failed for ${tag}: $($releaseErrors -join '; ')"
          }

          # Older main/tag runs must finish after their own immutable release is
          # proven. The exact source-specific current-main run owns Latest, so an
          # earlier run cannot block on or repair a newer generated-data commit.
          if (-not $shouldVerifyLatest) {
            Write-Host "Verified native release $tag -> $actualSha; intentionally non-Latest."
            exit 0
          }

          # Only a release that was current at the final promotion check owns the
          # Latest pointer. Observe GitHub's eventual consistency without letting a
          # newer main commit turn this successfully created immutable release into
          # a failure or an unsafe cross-commit recovery attempt.
          $latestVerified = $false
          $latestFailure = 'Latest endpoint was not checked'
          $latestObservationAttempts = 12
          for ($attempt = 1; $attempt -le $latestObservationAttempts; $attempt++) {
            try {
              $latestJson = Invoke-GhWithRetry -Description "native Latest readback for $tag" `
                -Arguments @('api', "repos/$env:GITHUB_REPOSITORY/releases/latest") `
                -Attempts 1
              $latestRelease = $latestJson | ConvertFrom-Json -ErrorAction Stop
              $latestErrors = @(Get-NativeLatestPostconditionErrors `
                -Release $latestRelease `
                -ExpectedSha $expectedSha `
                -ExpectedTag $tag)
              if ($latestErrors.Count -eq 0) {
                $latestVerified = $true
                break
              }
              $latestFailure = $latestErrors -join '; '
            }
            catch {
              $latestFailure = $_.Exception.Message
            }
            if ($attempt -lt $latestObservationAttempts) { Start-Sleep -Seconds 2 }
          }

          if (-not $latestVerified) {
            git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
            if ($LASTEXITCODE -ne 0) { throw 'could not refresh origin/main after native Latest observation' }
            $finalMainSha = (git rev-parse refs/remotes/origin/main).Trim().ToLowerInvariant()
            if ($LASTEXITCODE -ne 0 -or $finalMainSha -notmatch '^[0-9a-f]{40}$') {
              throw "could not resolve origin/main after native Latest observation: $finalMainSha"
            }
            if ($finalMainSha -ne $expectedSha) {
              Write-Host "Verified native release $tag -> $actualSha; main advanced to $finalMainSha, so a newer run owns Latest."
              exit 0
            }
            throw "native Latest postcondition failed for $tag after $latestObservationAttempts attempts: $latestFailure"
          }

          Write-Host "Verified native release $tag -> $actualSha; Latest=$tag"
